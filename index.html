<title>Paraguay Briefing</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:#F0F4FF;color:#1E293B;line-height:1.6;min-height:100vh}
a{color:#3B82F6;text-decoration:none}a:hover{text-decoration:underline}
.header{background:#fff;padding:20px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);position:sticky;top:0;z-index:100;border-bottom:3px solid #3B82F6}
.header-left{display:flex;align-items:center;gap:14px}
.header-logo{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,#3B82F6,#6366F1);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;font-weight:700;flex-shrink:0}
.header-left h1{font-size:20px;font-weight:700;color:#1E293B}
.header-left .subtitle{font-size:12px;color:#64748B;margin-top:2px}
.header-right{display:flex;gap:8px;align-items:center}
.btn-lang{background:#EEF2FF;color:#4F46E5;font-weight:700;font-size:12px;padding:8px 14px;border-radius:20px;border:none;cursor:pointer}
.btn-lang:hover{background:#E0E7FF}
.btn-primary{background:#3B82F6;color:#fff;font-weight:600;font-size:12px;padding:8px 16px;border-radius:20px;border:none;cursor:pointer;transition:all .15s}
.btn-primary:hover{background:#2563EB;transform:translateY(-1px);box-shadow:0 4px 12px rgba(59,130,246,.3)}
.btn-secondary{background:#F1F5F9;color:#475569;font-weight:600;font-size:12px;padding:8px 16px;border-radius:20px;border:none;cursor:pointer;transition:all .15s}
.btn-secondary:hover{background:#E2E8F0}
.btn-sm{font-size:11px;padding:6px 12px}
.update-modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,23,42,.6);z-index:200;display:flex;align-items:center;justify-content:center;animation:moFade .2s}
.update-modal{background:#fff;border-radius:14px;padding:24px 28px;width:440px;max-width:90vw;box-shadow:0 24px 80px rgba(0,0,0,.25);animation:moZoom .25s}
.update-modal h3{font-size:17px;font-weight:700;color:#1E293B;margin-bottom:16px}
.update-modal label{display:block;font-size:12px;font-weight:600;color:#64748B;margin-bottom:4px}
.update-modal select,.update-modal input{width:100%;padding:8px 12px;border:1px solid #CBD5E1;border-radius:8px;font-size:13px;margin-bottom:14px;color:#1E293B;background:#fff}
.update-modal .btn-row{display:flex;gap:8px;justify-content:flex-end}
.time-presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.time-preset{padding:5px 12px;border-radius:14px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid #CBD5E1;background:#fff;color:#64748B;transition:all .12s}
.time-preset:hover,.time-preset.active{background:#EEF2FF;color:#4F46E5;border-color:#C7D2FE}
.history-list{max-height:300px;overflow-y:auto}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border:1px solid #E2E8F0;border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .12s}
.history-item:hover{background:#F8FAFC;border-color:#CBD5E1}
.history-item .hi-title{font-weight:600;font-size:13px;color:#1E293B}
.history-item .hi-meta{font-size:11px;color:#94A3B8}
.history-item .hi-count{font-size:11px;font-weight:600;color:#3B82F6;background:#EEF2FF;padding:2px 8px;border-radius:10px}
.loading-spinner{display:inline-block;width:16px;height:16px;border:2px solid #CBD5E1;border-top-color:#3B82F6;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.standalone-banner{background:#FEF3C7;color:#92400E;text-align:center;padding:6px 16px;font-size:12px;border-bottom:1px solid #FDE68A;display:none}
.standalone-banner code{background:#FDE68A;padding:1px 5px;border-radius:3px;font-size:11px}

.stats-row{max-width:1400px;margin:0 auto;padding:12px 32px 16px;display:flex;flex-direction:column;gap:8px}
.stats-row-total{display:flex;justify-content:center}
.stats-row-sections{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:768px){.stats-row-sections{grid-template-columns:repeat(2,1fr)}}
.stat-pill{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px;cursor:pointer;transition:all .2s;border:2px solid transparent;font-size:13px;font-weight:600;user-select:none;min-width:0}
.stat-pill:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.pill-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pill-label{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill-count{font-size:14px;font-weight:700;margin-left:auto;flex-shrink:0;background:rgba(255,255,255,.5);padding:1px 8px;border-radius:10px}
.stat-pill.pill-total{background:#1E293B;color:#fff;font-weight:700;border-radius:24px;display:inline-flex}
.stat-pill.pill-total .pill-count{background:rgba(255,255,255,.2)}

.content{max-width:1400px;margin:0 auto;padding:0 32px 60px}
.section{background:#fff;border-radius:14px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.05);overflow:hidden;border-top:4px solid #3B82F6}
.section.s0{border-top-color:#3B82F6}.section.s1{border-top-color:#EF4444}.section.s2{border-top-color:#10B981}
.section.s3{border-top-color:#8B5CF6}.section.s4{border-top-color:#06B6D4}.section.s5{border-top-color:#F59E0B}
.section.s6{border-top-color:#6366F1}.section.s7{border-top-color:#EC4899}.section.tier2{background:#FAFBFC}
.section-header{padding:16px 22px 0;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.section-header h2{font-size:16px;font-weight:700;color:#1E293B}
.section-header .badge{font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;background:#F1F5F9;color:#64748B;white-space:nowrap}
.section-desc{padding:4px 22px 10px;font-size:12px;color:#94A3B8}
.events-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:4px 22px 18px}
@media(max-width:860px){.events-grid{grid-template-columns:1fr}.event-card{flex-direction:column}.event-card .event-img{width:100%!important;min-height:120px;max-height:180px}}
.event-card{background:#fff;border:1px solid #E2E8F0;border-radius:10px;overflow:hidden;transition:all .2s;display:flex}
.event-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.08);transform:translateY(-1px);border-color:#CBD5E1}
.event-card .event-img{width:160px;min-height:140px;flex-shrink:0;position:relative;overflow:hidden}
.event-card .event-img img{width:100%;height:100%;object-fit:cover;display:block}
.event-card .event-img .img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff}
.event-card .event-body{padding:12px 15px;flex:1;min-width:0;display:flex;flex-direction:column}
.event-card .event-meta{display:flex;gap:5px;margin-bottom:6px;flex-wrap:wrap}
.event-card .event-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px}
.event-tag.date{background:#F1F5F9;color:#64748B}.event-tag.gov{background:#DCFCE7;color:#15803D}
.event-tag.auth{background:#DBEAFE;color:#1D4ED8}.event-tag.source{background:#FEF3C7;color:#A16207}
.event-tag.client{background:#FCE7F3;color:#BE185D}
.event-card .event-preview{font-size:13px;color:#334155;line-height:1.6;flex:1;overflow:visible;max-height:none}
.event-card .event-link{font-size:11px;margin-top:6px;color:#3B82F6;font-weight:500}
.analysis-body{padding:4px 22px 20px;font-size:13px;line-height:1.8;color:#334155}
.analysis-body h3{font-size:15px;font-weight:700;margin:14px 0 6px;color:#1E293B}
.analysis-body ul{padding-left:0;list-style:none}
.analysis-body li{padding:2px 0 2px 18px;position:relative}
.analysis-body li::before{content:"•";position:absolute;left:2px;color:#3B82F6;font-weight:bold}
.tier-divider{text-align:center;padding:16px 0 8px;margin:8px 0}
.tier-divider span{background:linear-gradient(135deg,#3B82F6,#6366F1);color:#fff;padding:8px 28px;border-radius:20px;font-size:13px;font-weight:600;box-shadow:0 2px 8px rgba(59,130,246,.25)}
.footer{text-align:center;padding:20px 32px 40px;color:#94A3B8;font-size:12px;max-width:1400px;margin:0 auto}
.macro-dashboard{background:#fff;border-radius:14px;margin-bottom:18px;padding:16px 22px 14px;box-shadow:0 1px 4px rgba(0,0,0,.05);border-top:4px solid #1E293B}
.macro-title{font-size:15px;font-weight:700;color:#1E293B;margin-bottom:2px}
.macro-period{font-size:11px;font-weight:400;color:#94A3B8;margin-left:6px}
.macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}
@media(max-width:900px){.macro-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.macro-grid{grid-template-columns:1fr}}
.macro-card{background:#F8FAFC;border-radius:8px;padding:10px 8px 4px;border:1px solid #E2E8F0}
.macro-card-title{font-size:10.5px;font-weight:600;color:#475569;margin-bottom:4px;text-align:center;line-height:1.3;min-height:28px;display:flex;align-items:center;justify-content:center}
.macro-card{position:relative}
.macro-source{position:absolute;top:6px;right:8px;font-size:7.5px;color:#94A3B8;font-weight:500;background:#fff;padding:1px 5px;border-radius:3px;border:1px solid #E2E8F0;z-index:1;pointer-events:none}
.macro-latest{display:flex;justify-content:center;align-items:baseline;gap:4px;margin-top:2px;padding:3px 0}
.macro-latest-label{font-size:9px;color:#94A3B8;font-weight:500}
.macro-latest-val{font-size:15px;font-weight:700;color:#1E293B}
.macro-latest-unit{font-size:9px;color:#64748B;font-weight:500}
.macro-latest-date{font-size:9px;color:#94A3B8}
.macro-note{font-size:9px;color:#94A3B8;margin-top:1px}
.macro-card{cursor:pointer;transition:transform .15s,box-shadow .15s}
.macro-card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.macro-modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,23,42,.6);z-index:200;display:flex;align-items:center;justify-content:center;cursor:pointer;animation:moFade .2s}
.macro-modal-card{background:#fff;border-radius:16px;padding:24px 28px 18px;width:680px;max-width:94vw;max-height:90vh;overflow-y:auto;cursor:default;box-shadow:0 24px 80px rgba(0,0,0,.25);position:relative;animation:moZoom .25s}
.macro-modal-card .macro-card{border:none;padding:0;background:transparent;cursor:default}
.macro-modal-card .macro-card:hover{transform:none;box-shadow:none}
.macro-modal-card .macro-card-title{font-size:15px;min-height:auto;margin-bottom:10px}
.macro-modal-card .macro-legend,.macro-modal-card [style*=legend]{font-size:11px!important}
.macro-modal-close{position:absolute;top:10px;right:16px;font-size:26px;cursor:pointer;color:#94A3B8;background:none;border:none;line-height:1;z-index:10;padding:4px 8px;border-radius:6px}
.macro-modal-close:hover{color:#475569;background:#F1F5F9}
.macro-data-section{margin-top:14px;border-top:1px solid #E2E8F0;padding-top:10px}
.macro-data-toggle{background:#F8FAFC;border:1px solid #CBD5E1;padding:6px 16px;border-radius:6px;font-size:12px;color:#64748B;cursor:pointer;font-weight:500}
.macro-data-toggle:hover{background:#EEF2FF;color:#4F46E5;border-color:#C7D2FE}
.macro-data-table-wrap{margin-top:10px;max-height:340px;overflow-y:auto;border:1px solid #E2E8F0;border-radius:8px}
.macro-data-table{width:100%;border-collapse:collapse;font-size:12px}
.macro-data-table th{background:#F8FAFC;padding:7px 12px;text-align:right;font-weight:600;color:#475569;border-bottom:2px solid #E2E8F0;position:sticky;top:0}
.macro-data-table th:first-child{text-align:left}
.macro-data-table td{padding:5px 12px;text-align:right;border-bottom:1px solid #F1F5F9;color:#334155;font-variant-numeric:tabular-nums}
.macro-data-table td:first-child{text-align:left;color:#64748B;font-weight:500}
.macro-data-table tbody tr:hover td{background:#EEF2FF}
.macro-na{color:#CBD5E1!important}
@keyframes moFade{from{opacity:0}to{opacity:1}}
@keyframes moZoom{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
@media(max-width:768px){.header{padding:14px 16px}.header-left h1{font-size:16px}.stats-row{padding:10px 14px;gap:6px}.stat-pill{padding:8px 12px;font-size:12px}.pill-label{font-size:11px}.content{padding:0 12px 40px}.section-header{padding:12px 14px 0}.events-grid{grid-template-columns:1fr;padding:4px 14px 14px}}
</style>
</head>

window.EMBEDDED_BRIEFINGS = {"zh": {"topic": "巴拉圭简报", "time_span": "June 22 – June 28, 2026", "tiers": [{"name": "Part I: Key News & Developments", "description": "Macro economy, politics, social security, international relations, industry, and key client movements in Paraguay"}, {"name": "Part II: Analysis & Recommendations", "description": "Enterprise impact assessment and China-specific strategic recommendations"}], "sections": [{"title": "一、宏观经济动态", "description": "国内生产总值增长、通货膨胀、汇率、货币政策、财政状况、关键行业表现", "tier": 1, "events": [{"title": "巴拉圭2026年第一季度国内生产总值增长5.8%，领跑区域经济增长（2026年6月26日）", "date": "2026-06-26", "source_url": "https://www.infobae.com/america/agencias/2026/06/26/economia-paraguaya-crecio-un-58-en-el-primer-trimestre-de-2026-segun-el-banco-central/", "source_name": "Infobae / EFE", "summary": "巴拉圭2026年第一季度国内生产总值同比增长5.8%，为拉丁美洲最高增速，超过秘鲁（3.5%）、阿根廷（2.3%）、哥伦比亚（2.2%）、巴西（1.8%）、乌拉圭（0.9%）和智利（-0.5%）。剔除农业和两国共建水电项目后，经济增长率达6.0%，主要受服务业（+6.6%）、制造业（+6.0%）和建筑业（+5.6%）拉动。巴拉圭央行预计2026年全年经济增长4.2%。", "image_url": null, "is_gov_source": false, "is_authoritative": true}, {"title": "巴拉圭央行连续第四个月维持政策利率在5.50%不变，通胀水平保持低位（2026年6月25日）", "date": "2026-06-25", "source_url": "https://www.lanacion.com.py/negocios/2026/06/25/bcp-mantiene-tasa-de-referencia-ante-dinamismo-economico-e-inflacion-bajo-control/", "source_name": "La Nación", "summary": "巴拉圭央行于6月25日一致决定将基准利率维持在5.50%不变，自2026年2月以来保持中性立场。2026年5月消费者物价指数同比涨幅为2.4%，远低于3.5%的目标水平。核心通胀率仅为1.21%。巴拉圭央行指出，油价下跌（美伊临时协议后跌破每桶80美元）是利好因素，同时将美国关税不确定性和地缘政治风险列为不利因素。", "image_url": "https://www.lanacion.com.py/resizer/v2/SXV6CQVMERCBLNMKKQLQG6R7EY.jpg?auth=27556d5160e4ec2845a6fdff5b83aa69481a9d89e156926568fb7fbc8dd3d7c3&width=1200&height=630&smart=true", "is_gov_source": false, "is_authoritative": true}, {"title": "国际货币基金组织认可巴拉圭经济的韧性与实力——培尼亚总统（2026年6月26日）", "date": "2026-06-26", "source_url": "https://www.lanacion.com.py/negocios/2026/06/26/el-fmi-reconoce-la-fortaleza-de-la-economia-paraguaya-afirma-pena/", "source_name": "La Nación", "summary": "圣地亚哥·佩尼亚总统与国际货币基金组织官员会晤，对方认可巴拉圭的经济韧性。政府目标是在2035年前实现经济翻番。世界银行预测2026-2028年期间平均增长率为4.2%。巴拉圭已连续第二年保持穆迪授予的投资级评级，惠誉和标普的评级上调正在审议中。", "image_url": "https://www.lanacion.com.py/resizer/v2/PT53TKDR7VGZ7M7C7FAFCJO7TY.jpg?auth=21d930f66d271b23333705ab890d5295558a2c11a88764f11b46303fcdbdd49c&width=1200&height=630&smart=true", "is_gov_source": false, "is_authoritative": true}, {"title": "巴拉圭央行报告：2026年第一季度私人消费增长4.8%（2026年6月27日）", "date": "2026-06-27", "source_url": "https://www.lanacion.com.py/negocios/2026/06/27/consumo-se-expandio-48-en-el-primer-trimestre-reporta-el-bcp/", "source_name": "La Nación", "summary": "2026年第一季度，国内消费同比增长4.8%，反映出在低通胀率（2.4%）和历史上强势的巴拉圭瓜拉尼支撑下，家庭需求强劲。总资本形成增长3.7%，表明投资势头持续。巴拉圭瓜拉尼被彭博社评为拉丁美洲最稳定的货币，2025年对美元升值约17%。", "image_url": "https://www.lanacion.com.py/resizer/v2/PMG5T43LPJEENNIQTDHPGWTR5E.jpeg?auth=0e53476508c67edde9d00e5e87060da1ba5abc7987e46411d9a8ed63f58a9ff3&width=1200&height=630&smart=true", "is_gov_source": false, "is_authoritative": true}], "impact_analysis": "", "user_notes": ""}, {"title": "二、政治与政策变化", "description": "重大立法、政策调整、外资监管、税制改革、投资激励措施", "tier": 1, "events": [{"title": "巴拉圭推出\"投资者通行证\"——通过四条投资路径直接获得永久居留权（2026年6月22日）", "date": "2026-06-22", "source_url": "https://www.fragomen.com/insights/paraguay-new-investor-pass-expands-permanent-residence-options.html", "source_name": "Fragomen / MIC", "summary": "根据《工商部第0283/2026号决议》（2026年4月28日生效），外国投资者可通过以下四种途径直接获得永久居留权：（一）通过单一投资窗口进行生产性投资——最低投资额7万美元，创造5个本地就业岗位；（二）房地产投资——购买20万美元的创收型房产；（三）金融工具投资——持有20万美元金融资产两年以上；（四）旅游业投资——15万美元。居民股息税从15%降至8%。居住满三年即可申请入籍，且无需放弃原有国籍。", "image_url": "https://www.fragomen.com/a/web/6neDND2DvH5cq9pLmAp2Ht/9PCium/open-graph-main-2025.jpg", "is_gov_source": true, "is_authoritative": true}, {"title": "移民局更新永久居留经济偿付能力要求——自7月6日起生效（2026年6月25日）", "date": "2026-06-25", "source_url": "https://www.ip.gov.py/ip/2026/06/25/migraciones-actualiza-requisitos-para-residencia-permanente-en-paraguay/", "source_name": "Agencia IP", "summary": "国家移民局第407/2026号决议规定了永久居留权经济偿付能力的12类证明，涵盖专业人士、数字游民、房产所有者、股东及退休人员等群体。关键变化在于：仅凭大学学历已不再符合要求——申请人必须证明其正在从事专业工作并拥有收入来源。该决议统一了第6984/2022号法律与《南方共同市场居留协定》的审核标准，自2026年7月6日起生效。", "image_url": "https://www.ip.gov.py/ip/wp-content/uploads/2026/06/Gacetilla-774-960x560-1.jpg", "is_gov_source": true, "is_authoritative": true}, {"title": "关于维耶塔项目电价的总统令被取消并重新谈判（2026年6月10日）", "date": "2026-06-10", "source_url": "https://www.investegate.co.uk/announcement/rns/atome-energy--atom/villeta-project-update/9611990", "source_name": "ATOME PLC / RNS", "summary": "2026年1月，一项为ATOME公司维耶塔绿色化肥项目设定固定电价的总统令被撤销并替换。巴拉圭国家电力管理局（ANDE）受命重新谈判相关条款。该项目由国际金融公司（世界银行）、美洲开发银行投资部（IDB Invest）和欧洲投资银行（EIB）支持，将创造4000个建筑岗位和1300个运营岗位。这一政策逆转给巴拉圭能源密集型外国投资带来了政策不确定性。", "image_url": null, "is_gov_source": false, "is_authoritative": true}], "impact_analysis": "", "user_notes": ""}, {"title": "三、社会与劳动状况", "description": "劳动力市场、社会稳定、公共安全、就业数据", "tier": 1, "events": [{"title": "最低工资上调5%，自2026年7月1日起生效，调整为3,044,000巴拉圭瓜拉尼（2026年6月26日）", "date": "2026-06-26", "source_url": "https://www.lanacion.com.py/pais/2026/06/26/salario-minimo-nocturno-sube-a-g-3957200-y-rige-desde-julio-con-reajuste-del-5/", "source_name": "La Nación", "summary": "行政部门颁布法令，将最低工资上调5%。新的月最低工资标准为：日间工作304.4万瓜拉尼，夜间工作（含30%附加费）395.72万瓜拉尼。巴拉圭的最低工资调整与2026年拉丁美洲实际工资增长趋势保持一致，旨在弥补2021至2024年通胀期间损失的购买力。", "image_url": "https://www.lanacion.com.py/resizer/v2/55CET3CITNBK7KDUX7K4QQ7QDQ.jpg?auth=28d5963d75b01b2372b669a25a8f8341f41b281160157ecefdd95baf760552ba&width=1200&height=630&smart=true", "is_gov_source": false, "is_authoritative": true}, {"title": "正式就业人数创历史新高——超过84.2万名劳动者在巴拉圭社会保险局登记（2026年6月27日）", "date": "2026-06-27", "source_url": "https://www.lanacion.com.py/politica/2026/06/27/latorre-destaca-el-fortalecimiento-macroeconomico-con-impacto-en-el-empleo-formal/", "source_name": "La Nación", "summary": "众议院议长劳尔·拉托雷强调，2026年5月社会保障学会（IPS）登记的正规就业人数超过84.2万人，创下历史峰值。这一增长归因于宏观经济强化、投资促进和产业扩张政策。进一步推动就业正规化工作仍被确认为持续优先事项。", "image_url": "https://www.lanacion.com.py/resizer/v2/CO3Y7G4Z6VFA3LKZNKNDSKG2KM.jpg?auth=6d6cf1fc72278807fd51c44e18fc4d1 _url": "https://www.taiwanplus.com/news/taiwan-news/diplomacy/260618010/taiwan-deputy-foreign-minister-visits-paraguay", "source_name": "TaiwanPlus", "summary": "台湾外交部次长陈明祺于6月16日至19日访问巴拉圭，与外交部长鲁本·拉米雷斯·莱斯卡诺会晤。双方回顾了2026年5月培尼亚总统对台湾进行国事访问后的进展，并讨论了美国-台湾-巴拉圭三方在人工智能、5G、智慧交通及网络安全领域的合作框架。双方正在筹备2027年建交70周年的纪念活动议程。", "image_url": "https://prod-img.taiwanplus.com/img/resize/960x540/c3e8dcd9-04f1-43eb-ad23-90f4cd082718.jpg", "is_gov_source": false, "is_authoritative": true}, {"title": "巴拉圭外长誓言维持与台湾的关系，抵制北京施压（2026年6月22日）", "date": "2026-06-22", "source_url": "https://newagebd.net/article/209927/paraguays-fm-vows-to-keep-taiwan-ties", "source_name": "New Age / Agencia IP", "summary": "外长拉米雷斯·莱斯卡诺重申，巴拉圭不会接受中国提出的与台湾断绝关系的条件。巴拉圭仍是南美洲唯一与台湾保持全面外交关系的国家（全球12个此类国家之一）。双方合作支柱包括：台湾-巴拉圭理工大学、已在1000多家医疗机构部署的HIS医疗系统，以及亚松森综合医院建设项目。", "image_url": "https://outspoken.newagebd.com/files/img/https://www.newagebd.com/files/records/news/202308/209927_og.png", "is_gov_source": false, "is_authoritative": true}, {"title": "巴拉圭加强与美国协调——签署《部队地位协定》，参加“美洲之盾”峰会（2026年6月22日）", "date": "2026-06-22", "source_url": "https://aulablog.net/2026/06/02/china-taiwan-and-paraguay/", "source_name": "AULA Blog / FLACSO", "summary": "巴拉圭深化了与美国的战略协调，签署了《部队地位协定》并参加了“美洲之盾”峰会。分析人士指出，这种协调形成了台北-华盛顿-亚松森三角动态，若特朗普政府时期美国对台政策发生变化，可能使巴拉圭的长期外交战略复杂化。", "image_url": "https://aulablog.net/wp-content/uploads/2026/06/secretary_rubio_meets_with_paraguayan_president_54281364349.jpg", "is_gov_source": false, "is_authoritative": true}, {"title": "欧盟-南方共同市场自贸协定自5月1日起临时生效——乌拉圭接任南方共同市场轮值主席国（2026年6月27日）", "date": "2026-06-27", "source_url": "https://www.ultimahora.com/acuerdo-ue-mercosur-esta-en-vigencia-transitoria-a-la-espera-del-beneplacito-del-parlamento-europeo", "source_name": "Última Hora", "summary": "欧盟-南方共同市场贸易协定于2026年5月1日临时生效，待欧洲法院作出兼容性裁决后，还需欧洲议会最终批准。阿根廷在数周内已用尽蜂蜜、鸡蛋和大米的优惠配额。巴西对欧盟的家禽出口在5月激增61.6%。巴拉圭已根据该协定启动基于配额的双边贸易。", "image_url": "https://grupovierci.brightspotcdn.com/dims4/default/2a5bc29/2147483647/strip/true/crop/5472x3078+0+0/resize/14 基础设施及Tigo Money金融科技服务。。", "image_url": "https://cdnimg.bnamericas.com/POjyKcsMosNhPZELKycnexVTCIJVYkuGWGwnoaKLyxfeXJXJIBUyjNZapDzARxCo.jpg", "is_gov_source": false, "is_authoritative": true, "client_tag": "Tigo"}, {"title": "个人业务——未宣布5G计划；专注于低成本细分市场；覆盖缺口持续存在（2026年6月23日）", "date": "2026-06-23", "source_url": "https://www.bnamericas.com/en/news/paraguay-greenlights-claro-and-nubicom-to-ignite-5g-race", "source_name": "BNamericas", "summary": "阿根廷电信旗下品牌Personal选择不参与5G频谱拍卖，且未公布任何独立部署5G网络的计划。该运营商继续专注于低成本市场定位，网络覆盖集中于城市区域，在亚松森以外地区覆盖能力较弱。若未能升级网络，其可能被努比康公司取代，失去第三大移动运营商地位。。", "image_url": "https://cdnimg.bnamericas.com/POjyKcsMosNhPZELKycnexVTCIJVYkuGWGwnoaKLyxfeXJXJIBUyjNZapDzARxCo.jpg", "is_gov_source": false, "is_authoritative": true, "client_tag": "Personal"}, {"title": "努比康公司——新市场进入者，投资2亿美元用于5G建设；从零开始构建移动网络（2026年6月23日）", "date": "2026-06-23", "source_url": "https://www.datacenterdynamics.com/en/news/?tag=nubicom", "source_name": "DataCenterDynamics / BNamericas", "summary": "来自阿根廷萨尔塔省的固定互联网提供商努比康公司（Nubicom）赢得200兆赫的3.5吉赫兹频谱，并计划在巴拉圭投资2亿美元建设全新的5G网络。该公司须在6周内成立本地子公司，从零开始建设移动基础设施，且每100兆赫频谱至少部署100个基站。这是巴拉圭迄今最大的一笔单次5G投资。。", "image_url": null, "is_gov_source": false, "is_authoritative": true, "client_tag": "努比康"}], "impact_analysis": "", "user_notes": ""}, {"title": "七、企业综合影响分析", "description": "综合宏观趋势、行业动态及客户动向，评估巴拉圭企业运营环境。", "tier": 2, "events": [], "impact_analysis": "## 一、成本维度 🟡

基于本周数据对成本压力的综合评估：

- **能源成本**：总统令取消比列塔项目电价政策，为能源密集型投资带来政策不确定性。但巴拉圭丰富的水电盈余（可用容量超300兆瓦）及海夫公司成功达成的300兆瓦数据中心项目，证实能源仍属结构性成本优势。
- **汇率成本**：瓜拉尼保持拉丁美洲最稳定货币地位（彭博社数据），2025年对美元升值约17%。6月28日自由市场汇率约为6124瓜拉尼兑1美元。进口密集型行业受益于本币走强，出口企业面临利润空间压缩。
- **劳动力成本**：最低工资上调5%（自7月1日起调整为304.4万瓜拉尼）幅度温和，符合区域趋势。正规就业人数创历史新高，超过84.2万人，表明劳动力市场趋紧但仍具可负担性。

## 二、市场维度 🟢

巴拉圭市场机遇在数字基础设施领域显著扩大：

- **5G与电信**：国家电信委员会新频谱招标（2.3/3.5吉赫频段）及克拉罗/努比康公司5G商用部署，为电信设备、服务和应用程序供应商创造机遇。美国支持的设备限制政策利好非中国供应商。
- **人工智能与数据中心**：海夫公司人工智能云平台上线，依托可再生能源和暗光纤网络，将巴拉圭定位为南美新兴人工智能基础设施枢纽。由此催生数据中心建设、冷却系统、电源管理及专业信息技术人才需求。
- **欧盟市场准入**：《欧盟-南方共同市场自由贸易协定》（5月1日起临时生效）为牛肉、禽肉、糖等产品开放优惠配额。巴拉圭争取25%配额份额的诉求，彰显其抢占出口增长的雄心。

## 三、合规维度 🔴

合规风险需主动监控：

- **外资政策**：《投资者通行证》（工商部第0283/2026号决议）及更新版国家移民局第407/2026号决议大幅优化居留通道，但新增文件要求（需提供主动收入证明）。2026年预计8万份的申请激增可能超出处理能力。
- **能源监管**：比列塔法令逆转表明能源密集型项目不能假定电价稳定。国家电力局重新谈判带来执行时间表风险。
- **劳动合规**：劳动、就业和社会保障部开通WhatsApp投诉渠道，显示最低工资和劳动标准执法力度加强。企业应在7月1日工资调整前完成薪酬合规审计。

## 综合评估

ry": "Argentine operator Nubicom announced a $200 million investment plan for 5G network deployment in Paraguay, the largest single 5G investment in the country. Nubicom won 200 MHz in the 3.3–3.5 GHz band at the August 2025 CONATEL auction ($2M license fee) and is building a mobile network from scratch, having been an Argentine fixed-internet provider without prior mobile infrastructure. Commercial launch is targeted for Q1–Q2 2026 with a minimum of 100 base stations per 100 MHz.", "image_url": null, "is_gov_source": false, "is_authoritative": true}, {"title": "Claro wins 200 MHz of 3.5 GHz spectrum, set to launch commercial 5G in Greater Asunción (2026-06-23)", "date": "2026-06-23", "source_url": "https://www.bnamericas.com/en/news/paraguay-greenlights-claro-and-nubicom-to-ignite-5g-race", "source_name": "BNamericas", "summary": "Claro (América Móvil) won 200 MHz in the 3.5–3.7 GHz band at the CONATEL 5G auction, paying ~$2 million. Commercial 5G launch is expected in Greater Asunción by Q2 2026 with a six-month deployment obligation. Claro confirmed its mobile core network has already been upgraded for 5G. Tigo and Personal withdrew from the auction due to restrictions on Chinese equipment vendors (Huawei, ZTE), a move publicly endorsed by the US Embassy.", "image_url": "https://cdnimg.bnamericas.com/POjyKcsMosNhPZELKycnexVTCIJVYkuGWGwnoaKLyxfeXJXJIBUyjNZapDzARxCo.jpg", "is_gov_source": false, "is_authoritative": true}], "impact_analysis": "", "user_notes": ""}, {"title": "VI. Key Client Movements", "description": "Tracking strategic moves, investment plans, network deployment, and technology choices of Paraguay's major telecom clients", "tier": 1, "events": [{"title": "Claro — Wins 5G spectrum, prepares commercial launch in Asunción; core network upgraded (2026-06-23)", "date": "2026-06-23", "source_url": "https://www.bnamericas.com/en/news/paraguay-greenlights-claro-and-nubicom-to-ignite-5g-race", "source_name": "BNamericas", "summary": "Claro (América Móvil) secured 200 MHz of 3.5 GHz spectrum and is targeting commercial 5G launch in Greater Asunción by Q2 2026. Its mobile core has been upgraded for 5G. Deployment obligation: 100 base stations per 100 MHz, with 10% serving government entities. Claro is poised to be the first major operator offering 5G services in Paraguay.", "image_url": "https://cdnimg.bnamericas.com/POjyKcsMosNhPZELKycnexVTCIJVYkuGWGwnoaKLyxfeXJXJIBUyjNZapDzARxCo.jpg", "is_gov_source": false, "is_authoritative": true, "client_tag": "Claro"}, {"title": "Tigo — Retains 4G market leadership; limited 5G in select Asunción zones; withdrew from 5G auction (2026-06-23)", "date": "2026-06-23", "source_url": "https://www.bnamericas.com/en/news/paraguay-greenlights-claro-and-nubicom-to-ignite-5g-race", "source_name": "BNamericas", "summary": "Tigo (Millicom) remains the largest mobile operator in Paraguay by subscribers with the fastest 4G LTE network and best rural coverage. However, Tigo withdrew from the August 2025 5G spectrum auction due to restrictions on Chinese equipment vendors. Its current 5G footprint is limited to select zones in Asunción using existing spectrum. Company continues investing in 4G infrastructure and Tigo Money fintech services.", "image_url": "https://cdnimg.bnamericas.com/POjyKcsMosNhPZELKycnexVTCIJVYkuGWGwnoaKLyxfeXJXJIBUyjNZapDzARxCo.jpg", "is_gov_source": false, "is_authoritative": true, "client_tag": "Tigo"}, {"title": "Personal — No 5G plans announced; focused on low-cost niche; coverage gaps persist (2026-06-23)", "date": "2026-06-23", "source_url": "https://www.bnamericas.com/en/news/paraguay-greenlights-claro-and-nubicom-to-ignite-5g-race", "source_name": "BNamericas", "summary": "Personal (Telecom Argentina) chose not to participate in the 5G auction and has not announced any independent 5G deployment plans. The operator continues to focus on its low-cost market niche with coverage concentrated in urban areas and weaker presence outside Asunción. It risks being displaced by Nubicom as the third mobile operator if it fails to upgrade its network.", "image_url": "https://cdnimg.bnamericas.com/POjyKcsMosNhPZELKycnexVTCIJVYkuGWGwnoaKLyxfeXJXJIBUyjNZapDzARxCo.jpg", "is_gov_source": false, "is_authoritative": true, "client_tag": "Personal"}, {"title": "Nubicom — New market entrant with $200M 5G investment; building mobile network from scratch (2026-06-23)", "date": "2026-06-23", "source_url": "https://www.datacenterdynamics.com/en/news/?tag=nubicom", "source_name": "DataCenterDynamics / BNamericas", "summary": "Nubicom, an Argentine fixed-internet provider from Salta province, won 200 MHz of 3.5 GHz spectrum and plans a $200 million greenfield 5G network deployment in Paraguay. It must establish a local subsidiary (6-week deadline), build mobile infrastructure from zero, and deploy at least 100 base stations per 100 MHz. This represents the largest single 5G investment in Paraguay.", "image_url": null, "is_gov_source": false, "is_authoritative": true, "client_tag": "Nubicom"}], "impact_analysis": "", "user_notes": ""}, {"title": "VII. Comprehensive Enterprise Impact Analysis", "description": "Synthesizing macro trends, industry dynamics, and client movements to assess enterprise operating environment in Paraguay", "tier": 2, "events": [], "impact_analysis": "## I. Cost Dimension 🟡

Comprehensive assessment of cost pressures based on this week's data:

- **Energy costs**: Presidential decree cancellation on Villeta project electricity tariffs introduces policy uncertainty for energy-intensive investments. However, Paraguay's abundant hydroelectric surplus (300MW+ available) and HIVE's successful 300MW data center deal confirm energy remains a structural cost advantage.
- **Exchange rate costs**: The guaraní remains Latin America's most stable currency (Bloomberg), having appreciated ~17% vs USD in 2025. The free market rate is approximately 6,124 PYG/USD (June 28). Import-intensive businesses benefit from strong currency; exporters face margin pressure.
- **Labor costs**: The 5% minimum wage increase (PYG 3,044,000 from July 1) is moderate and aligned with regional trends. Formal employment at a record 842,000+ workers signals a tightening but still affordable labor market.

## II. Market Dimension 🟢

Paraguay's market opportunities are expanding notably in digital infrastructure:

- **5G & Telecom**: CONATEL's new spectrum tender (2.3/3.5 GHz) and the Claro/Nubicom 5G rollout create opportunities for telecom equipment, services, and application providers. The US-backed equipment restrictions favor non-Chinese vendors.
- **AI & Data Centers**: HIVE's AI cloud platform launch positions Paraguay as an emerging AI infrastructure hub in South America, leveraging renewable energy and dark fiber. This opens demand for data center construction, cooling, power management, and skilled IT labor.
- **EU Market Access**: The EU-Mercosur FTA (provisional force since May 1) opens preferential quotas for beef, poultry, sugar, and other products. Paraguay's demand for a 25% quota share reflects ambition to capture export growth.

## III. Compliance Dimension 🔴

Compliance risks require active monitoring:

- **Foreign investment policy**: The Investor Pass (MIC Resolution 0283/2026) and updated DNM Resolution 407/2026 substantially improve residency pathways but add new documentation requirements (active income proof). The rapid surge in applications (80,000 projected for 2026) may strain processing capacity.
- **Energy regulation**: The Villeta decree reversal signals that energy-intensive projects cannot assume fixed tariff stability. ANDE renegotiation introduces execution timeline risk.
- **Labor compliance**: MTESS WhatsApp complaint channel signals increased enforcement of minimum wage and labor standards. Companies should audit payroll compliance ahead of the July 1 wage adjustment.

## Integrated Assessment

This week's 22 monitored events (7 government-sourced) paint a picture of strong macroeconomic momentum (GDP +5.8%, record employment) combined with policy fluidity in energy and foreign investment regulation. The key near-term decision point is the June 29–30 Mercosur Summit outcome on EU quota distribution, which will shape Paraguay's export competitiveness for years.", "user_notes": ""}, {"title": "VIII. China-Specific Enterprise Risk & Opportunity Analysis", "description": "Tailored analysis for Chinese enterprises operating in or considering Paraguay, covering diplomatic risk, policy risk, and strategic recommendations", "tier": 2, "events": [], "impact_analysis": "## I. Risk Alerts

🔴 **High Priority:**

- **Diplomatic barrier**: Paraguay remains Taiwan's sole South American diplomatic ally. FM Ramírez Lezcano publicly reaffirmed refusal to switch recognition to Beijing. SOFA agreement with the US and trilateral US-Taiwan-Paraguay cooperation (AI, 5G, cybersecurity) further entrench this alignment. Chinese enterprises face elevated political scrutiny in project approvals and may encounter informal barriers.
- **Equipment vendor exclusion**: CONATEL's 5G auction rules effectively barred Chinese telecom equipment vendors (Huawei, ZTE) on security grounds, with explicit US Embassy endorsement. This precedent could extend to other critical infrastructure sectors, limiting market access for Chinese technology exports.

🟡 **Medium Priority:**

- **Competitive displacement**: Claro (América Móvil) and Nubicom ($200M investment) are capturing the 5G market first-mover advantage while Chinese vendors are excluded. Tigo and Personal, both Huawei/ZTE users, face strategic challenges in upgrading their networks.
- **Exchange rate exposure**: The strong guaraní (appreciated ~17% in 2025) reduces the CNY value of PYG-denominated profits for Chinese investors already in Paraguay.

## II. Opportunity Analysis

🟢 **Actionable Opportunities:**

- **Digital infrastructure gap**: Despite vendor restrictions, the HIVE AI data center project demonstrates demand for digital infrastructure partnerships. Chinese firms could explore non-equipment roles: engineering procurement construction (EPC), renewable power integration, cooling systems, and data center operations.
- **Agricultural technology**: Paraguay's soybean and beef export boom (GDP +5.8%, agriculture +8.2%) creates demand for precision agriculture, IoT sensors, and supply chain digitization — areas where Chinese agritech firms can compete without triggering security concerns.
- **Mercosur gateway**: Chinese enterprises with existing Brazil or Argentina operations can leverage the EU-Mercosur FTA framework for regional market access. The June 29–30 Mercosur Summit outcome on EU quotas may create new export channel opportunities.

## III. Strategic Recommendations

**Immediate:**
- Map all existing Paraguay investments against the new Investor Pass and DNM 407/2026 residency requirements to ensure compliance.
- Assess whether any telecom or critical infrastructure projects involve Chinese-origin equipment that could be affected by CONATEL's vendor restrictions.

**Short-term (1–3 months):**
- Explore third-country partnership models (e.g., via European or Brazilian subsidiaries) for 5G, data center, and digital infrastructure projects to mitigate political sensitivity.
- Establish a local policy monitoring mechanism to track CONATEL spectrum tenders, ANDE energy tariff negotiations, and MIC investment regulation changes.

**Medium-term (3–12 months):**
- Monitor the US-Taiwan-Paraguay trilateral framework evolution and its impact on Chinese enterprise access.
- Evaluate agricultural technology and renewable energy as lower-political-risk entry points for the Paraguayan market.", "user_notes": ""}]}};

function renderMacroDataTable(d,unit){

  h+='<div class="macro-data-table-wrap" style="display:none"><table class="macro-data-table"><thead><tr><th>'+L('月份','Month')+'</th><th>2023</th><th>2024</th><th>2025</th><th>2026*</th></tr></thead><tbody>';

    h+='<tr><td>'+L(MONTHS_L[0][m],MONTHS_L[1][m])+'</td>';
    var src=d.monthly||d.line;for(var y=0;y<4;y++){var idx=y*12+m,v=src[idx];if(v!=null)h+='<td>'+(v>=100?Math.round(v):v.toFixed(1))+(unit||'')+'</td>';else h+='<td class="macro-na">—</td>';}
    h+='</tr>';
  }

function renderFXDailyTable(d,unit){
  var DM=[31,28,31,30,31,30,31,31,30,31,30,31],dl=d.line||[];
  var h='<div class="macro-data-section"><button class="macro-data-toggle" onclick="toggleDataTable(this)">'+L('查看每日源数据 ▼','View Daily Data ▼')+'</button>';
  h+='<div class="macro-data-table-wrap" style="display:none"><table class="macro-data-table"><thead><tr><th>'+L('日期','Date')+'</th><th>PYG/USD</th></tr></thead><tbody>';
  var dates=[],day=1,mo=0,yr=2023;
  for(var i=0;i<dl.length;i++){
    dates.push(yr+'-'+(mo<9?'0'+(mo+1):(mo+1))+'-'+(day<10?'0'+day:day));
    day++;var dim=DM[mo];if(mo===1&&yr%4===0)dim=29;

    h+='<tr><td>'+dates[i]+'</td><td>'+Math.round(dl[i])+(unit||'')+'</td></tr>';

function renderSection(sec,idx){
  var events=sec.events||[],isT2=sec.tier===2;
  var g=GRAD[idx%8],icon=ICONS[idx%8];
  var body='';
  if(isT2||events.length===0){

    else if(!isT2)body='<div style="padding:4px 22px 16px;color:#94A3B8;font-size:13px;">'+L('暂无此时间段内的事件','No events in this period')+'</div>';
  }else{

function renderCard(evt,phFrom,phTo,icon){
  var img=evt.image_url,hasImg=img&&img.indexOf('http')===0;
  var ih='';

  ih+='<div class="img-placeholder" style="background:linear-gradient(135deg,'+phFrom+','+phTo+');'+(hasImg?'display:none':'display:flex')+';font-size:32px;color:#fff;">'+icon+'</div>';

  var tags='';
  if(evt.date)tags+='<span class="event-tag date">'+esc(evt.date)+'</span>';
  if(evt.client_tag)tags+='<span class="event-tag client">'+esc(evt.client_tag)+'</span>';
  if(evt.is_gov_source)tags+='<span class="event-tag gov">'+L('政府官网','Government')+'</span>';
  else if(evt.is_authoritative)tags+='<span class="event-tag auth">'+L('权威媒体','Authoritative')+'</span>';
  if(evt.source_name)tags+='<span class="event-tag source">'+esc(evt.source_name)+'</span>';

  var link=evt.source_url?'<a class="event-link" href="'+esc(evt.source_url)+'" target="_blank" rel="noopener">'+L('查看原文 →','Read more →')+'</a>':'';
  var preview=evt.summary||'';if(!preview&&evt.title)preview=evt.title;
  return '<div class="event-card"><div class="event-img">'+ih+'</div><div class="event-body"><div class="event-meta">'+tags+'</div><div class="event-preview">'+esc(ss(preview))+'</div>'+link+'</div></div>';
}

function fmt(text){
  var h=esc(text);
  h=h.replace(/^## (.+)$/gm,'<h3>$1</h3>');
  h=h.replace(/^- (.+)$/gm,'<li>$1</li>');
  h=h.replace(/((?:<li>.*<\/li>\n?)+)/g,'<ul>$1</ul>');
  h=h.replace(/\n/g,'<br>');
  return h;
}

function scrollToSec(idx){
  var pills=document.querySelectorAll('.stat-pill');
  for(var i=0;i<pills.length;i++)pills[i].style.outline='';
  if(idx===null||idx===undefined){window.scrollTo({top:0,behavior:'smooth'});return;}
  var el=document.getElementById('sec-'+idx);
  if(!el)return;
  el.scrollIntoView({behavior:'smooth',block:'start'});
  el.style.boxShadow='0 0 0 3px #3B82F6';
  setTimeout(function(){el.style.boxShadow='';},1500);
}

  if(window.IS_STANDALONE)document.getElementById('standaloneBanner').style.display='block';
  if(MACRO_FX.monthly&&!MACRO_FX.line)MACRO_FX.line=expandToDaily(MACRO_FX.monthly,MACRO_FX_MONTHDAYS);
  fetch('/api/briefing/briefing_en.json').then(function(r){if(!r.ok)throw Error();return r.json();}).then(function(data){
    DATA['en']=data;briefingData=data;currentLang='en';renderAll();updateLangBtn();
    fetch('/api/briefing/briefing.json').then(function(r){if(r.ok)return r.json();}).then(function(zh){if(zh)DATA['zh']=zh;}).catch(function(){});
    if(!window.IS_STANDALONE)fetchLiveFX();
  }).catch(function(){
    briefingData=DATA['en'];currentLang='en';renderAll();updateLangBtn();
  });
});
function fetchLiveFX(){
  fetch('/api/macro/fx').then(function(r){if(!r.ok)return;return r.json();}).then(function(d){
    if(!d||!d.rate)return;
    var arr=MACRO_FX.monthly||MACRO_FX.line||[];
    arr[arr.length-1]=d.rate;
    window.MACRO_FX_DATE=(d.date||'').replace(/-/g,'.');
    MACRO_FX.line=expandToDaily(MACRO_FX.monthly,MACRO_FX_MONTHDAYS);
    renderAll();
  }).catch(function(){});
}
</script>
</body>
