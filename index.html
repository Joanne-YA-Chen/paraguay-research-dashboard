<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paraguay Briefing</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:#F0F4FF;color:#1E293B;line-height:1.6;min-height:100vh}
a{color:#3B82F6;text-decoration:none}a:hover{text-decoration:underline}
.header{background:#fff;padding:20px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);position:sticky;top:0;z-index:100;border-bottom:3px solid #3B82F6}
.header-left{display:flex;align-items:center;gap:14px}
.header-logo{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,#3B82F6,#6366F1);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;font-weight:700;flex-shrink:0}
.header-left h1{font-size:20px;font-weight:700;color:#1E293B}
.header-left .subtitle{font-size:12px;color:#64748B;margin-top:2px}
.header-right{display:flex;gap:8px;align-items:center}
.btn-lang{background:#EEF2FF;color:#4F46E5;font-weight:700;font-size:12px;padding:8px 14px;border-radius:20px;border:none;cursor:pointer}
.btn-lang:hover{background:#E0E7FF}
.btn-primary{background:#3B82F6;color:#fff;font-weight:600;font-size:12px;padding:8px 16px;border-radius:20px;border:none;cursor:pointer;transition:all .15s}
.btn-primary:hover{background:#2563EB;transform:translateY(-1px);box-shadow:0 4px 12px rgba(59,130,246,.3)}
.btn-secondary{background:#F1F5F9;color:#475569;font-weight:600;font-size:12px;padding:8px 16px;border-radius:20px;border:none;cursor:pointer;transition:all .15s}
.btn-secondary:hover{background:#E2E8F0}
.btn-sm{font-size:11px;padding:6px 12px}
.update-modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,23,42,.6);z-index:200;display:flex;align-items:center;justify-content:center;animation:moFade .2s}
.update-modal{background:#fff;border-radius:14px;padding:24px 28px;width:440px;max-width:90vw;box-shadow:0 24px 80px rgba(0,0,0,.25);animation:moZoom .25s}
.update-modal h3{font-size:17px;font-weight:700;color:#1E293B;margin-bottom:16px}
.update-modal label{display:block;font-size:12px;font-weight:600;color:#64748B;margin-bottom:4px}
.update-modal select,.update-modal input{width:100%;padding:8px 12px;border:1px solid #CBD5E1;border-radius:8px;font-size:13px;margin-bottom:14px;color:#1E293B;background:#fff}
.update-modal .btn-row{display:flex;gap:8px;justify-content:flex-end}
.time-presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.time-preset{padding:5px 12px;border-radius:14px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid #CBD5E1;background:#fff;color:#64748B;transition:all .12s}
.time-preset:hover,.time-preset.active{background:#EEF2FF;color:#4F46E5;border-color:#C7D2FE}
.history-list{max-height:300px;overflow-y:auto}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border:1px solid #E2E8F0;border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .12s}
.history-item:hover{background:#F8FAFC;border-color:#CBD5E1}
.history-item .hi-title{font-weight:600;font-size:13px;color:#1E293B}
.history-item .hi-meta{font-size:11px;color:#94A3B8}
.history-item .hi-count{font-size:11px;font-weight:600;color:#3B82F6;background:#EEF2FF;padding:2px 8px;border-radius:10px}
.loading-spinner{display:inline-block;width:16px;height:16px;border:2px solid #CBD5E1;border-top-color:#3B82F6;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.standalone-banner{background:#FEF3C7;color:#92400E;text-align:center;padding:6px 16px;font-size:12px;border-bottom:1px solid #FDE68A;display:none}
.standalone-banner code{background:#FDE68A;padding:1px 5px;border-radius:3px;font-size:11px}

.stats-row{max-width:1400px;margin:0 auto;padding:12px 32px 16px;display:flex;flex-direction:column;gap:8px}
.stats-row-total{display:flex;justify-content:center}
.stats-row-sections{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:768px){.stats-row-sections{grid-template-columns:repeat(2,1fr)}}
.stat-pill{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px;cursor:pointer;transition:all .2s;border:2px solid transparent;font-size:13px;font-weight:600;user-select:none;min-width:0}
.stat-pill:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.pill-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pill-label{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill-count{font-size:14px;font-weight:700;margin-left:auto;flex-shrink:0;background:rgba(255,255,255,.5);padding:1px 8px;border-radius:10px}
.stat-pill.pill-total{background:#1E293B;color:#fff;font-weight:700;border-radius:24px;display:inline-flex}
.stat-pill.pill-total .pill-count{background:rgba(255,255,255,.2)}

.content{max-width:1400px;margin:0 auto;padding:0 32px 60px}
.section{background:#fff;border-radius:14px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.05);overflow:hidden;border-top:4px solid #3B82F6}
.section.s0{border-top-color:#3B82F6}.section.s1{border-top-color:#EF4444}.section.s2{border-top-color:#10B981}
.section.s3{border-top-color:#8B5CF6}.section.s4{border-top-color:#06B6D4}.section.s5{border-top-color:#F59E0B}
.section.s6{border-top-color:#6366F1}.section.s7{border-top-color:#EC4899}.section.tier2{background:#FAFBFC}
.section-header{padding:16px 22px 0;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.section-header h2{font-size:16px;font-weight:700;color:#1E293B}
.section-header .badge{font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;background:#F1F5F9;color:#64748B;white-space:nowrap}
.section-desc{padding:4px 22px 10px;font-size:12px;color:#94A3B8}
.events-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:4px 22px 18px}
@media(max-width:860px){.events-grid{grid-template-columns:1fr}.event-card{flex-direction:column}.event-card .event-img{width:100%!important;min-height:120px;max-height:180px}}
.event-card{background:#fff;border:1px solid #E2E8F0;border-radius:10px;overflow:hidden;transition:all .2s;display:flex}
.event-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.08);transform:translateY(-1px);border-color:#CBD5E1}
.event-card .event-img{width:160px;min-height:140px;flex-shrink:0;position:relative;overflow:hidden}
.event-card .event-img img{width:100%;height:100%;object-fit:cover;display:block}
.event-card .event-img .img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff}
.event-card .event-body{padding:12px 15px;flex:1;min-width:0;display:flex;flex-direction:column}
.event-card .event-meta{display:flex;gap:5px;margin-bottom:6px;flex-wrap:wrap}
.event-card .event-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px}
.event-tag.date{background:#F1F5F9;color:#64748B}.event-tag.gov{background:#DCFCE7;color:#15803D}
.event-tag.auth{background:#DBEAFE;color:#1D4ED8}.event-tag.source{background:#FEF3C7;color:#A16207}
.event-card .event-title{font-size:13px;font-weight:600;color:#1E293B;margin-bottom:4px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.event-card .event-summary{font-size:12px;color:#64748B;line-height:1.5;flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.event-card .event-link{font-size:11px;margin-top:6px;color:#3B82F6;font-weight:500}
.analysis-body{padding:4px 22px 20px;font-size:13px;line-height:1.8;color:#334155}
.analysis-body h3{font-size:15px;font-weight:700;margin:14px 0 6px;color:#1E293B}
.analysis-body ul{padding-left:0;list-style:none}
.analysis-body li{padding:2px 0 2px 18px;position:relative}
.analysis-body li::before{content:"•";position:absolute;left:2px;color:#3B82F6;font-weight:bold}
.tier-divider{text-align:center;padding:16px 0 8px;margin:8px 0}
.tier-divider span{background:linear-gradient(135deg,#3B82F6,#6366F1);color:#fff;padding:8px 28px;border-radius:20px;font-size:13px;font-weight:600;box-shadow:0 2px 8px rgba(59,130,246,.25)}
.footer{text-align:center;padding:20px 32px 40px;color:#94A3B8;font-size:12px;max-width:1400px;margin:0 auto}
.macro-dashboard{background:#fff;border-radius:14px;margin-bottom:18px;padding:16px 22px 14px;box-shadow:0 1px 4px rgba(0,0,0,.05);border-top:4px solid #1E293B}
.macro-title{font-size:15px;font-weight:700;color:#1E293B;margin-bottom:2px}
.macro-period{font-size:11px;font-weight:400;color:#94A3B8;margin-left:6px}
.macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}
@media(max-width:900px){.macro-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.macro-grid{grid-template-columns:1fr}}
.macro-card{background:#F8FAFC;border-radius:8px;padding:10px 8px 4px;border:1px solid #E2E8F0}
.macro-card-title{font-size:10.5px;font-weight:600;color:#475569;margin-bottom:4px;text-align:center;line-height:1.3;min-height:28px;display:flex;align-items:center;justify-content:center}
.macro-card{position:relative}
.macro-source{position:absolute;top:6px;right:8px;font-size:7.5px;color:#94A3B8;font-weight:500;background:#fff;padding:1px 5px;border-radius:3px;border:1px solid #E2E8F0;z-index:1;pointer-events:none}
.macro-latest{display:flex;justify-content:center;align-items:baseline;gap:4px;margin-top:2px;padding:3px 0}
.macro-latest-label{font-size:9px;color:#94A3B8;font-weight:500}
.macro-latest-val{font-size:15px;font-weight:700;color:#1E293B}
.macro-latest-unit{font-size:9px;color:#64748B;font-weight:500}
.macro-latest-date{font-size:9px;color:#94A3B8}
.macro-note{font-size:9px;color:#94A3B8;margin-top:1px}
.macro-card{cursor:pointer;transition:transform .15s,box-shadow .15s}
.macro-card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.macro-modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,23,42,.6);z-index:200;display:flex;align-items:center;justify-content:center;cursor:pointer;animation:moFade .2s}
.macro-modal-card{background:#fff;border-radius:16px;padding:24px 28px 18px;width:680px;max-width:94vw;max-height:90vh;overflow-y:auto;cursor:default;box-shadow:0 24px 80px rgba(0,0,0,.25);position:relative;animation:moZoom .25s}
.macro-modal-card .macro-card{border:none;padding:0;background:transparent;cursor:default}
.macro-modal-card .macro-card:hover{transform:none;box-shadow:none}
.macro-modal-card .macro-card-title{font-size:15px;min-height:auto;margin-bottom:10px}
.macro-modal-card .macro-legend,.macro-modal-card [style*=legend]{font-size:11px!important}
.macro-modal-close{position:absolute;top:10px;right:16px;font-size:26px;cursor:pointer;color:#94A3B8;background:none;border:none;line-height:1;z-index:10;padding:4px 8px;border-radius:6px}
.macro-modal-close:hover{color:#475569;background:#F1F5F9}
.macro-data-section{margin-top:14px;border-top:1px solid #E2E8F0;padding-top:10px}
.macro-data-toggle{background:#F8FAFC;border:1px solid #CBD5E1;padding:6px 16px;border-radius:6px;font-size:12px;color:#64748B;cursor:pointer;font-weight:500}
.macro-data-toggle:hover{background:#EEF2FF;color:#4F46E5;border-color:#C7D2FE}
.macro-data-table-wrap{margin-top:10px;max-height:340px;overflow-y:auto;border:1px solid #E2E8F0;border-radius:8px}
.macro-data-table{width:100%;border-collapse:collapse;font-size:12px}
.macro-data-table th{background:#F8FAFC;padding:7px 12px;text-align:right;font-weight:600;color:#475569;border-bottom:2px solid #E2E8F0;position:sticky;top:0}
.macro-data-table th:first-child{text-align:left}
.macro-data-table td{padding:5px 12px;text-align:right;border-bottom:1px solid #F1F5F9;color:#334155;font-variant-numeric:tabular-nums}
.macro-data-table td:first-child{text-align:left;color:#64748B;font-weight:500}
.macro-data-table tbody tr:hover td{background:#EEF2FF}
.macro-na{color:#CBD5E1!important}
@keyframes moFade{from{opacity:0}to{opacity:1}}
@keyframes moZoom{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
@media(max-width:768px){.header{padding:14px 16px}.header-left h1{font-size:16px}.stats-row{padding:10px 14px;gap:6px}.stat-pill{padding:8px 12px;font-size:12px}.pill-label{font-size:11px}.content{padding:0 12px 40px}.section-header{padding:12px 14px 0}.events-grid{grid-template-columns:1fr;padding:4px 14px 14px}}
</style>
</head>

l-estudio-de-14-puntos-en-sesion-del-martes-23/","source_name": "La Nación","summary": "众议院定于6月23日召开全体会议，审议14项议案。核心项目：① 巴拉圭-日本促进投资协定（6月11日东京100+日本企业高管研讨会后的立法跟进）；② 南共市领事合作协定；③ 工程履约保证金利息支付等。日本协定将为日本企业在巴投资提供法律保障——日本大使此前称大型日企正将巴拉圭视为南美洲投资和出口基地。","image_url": null,"is_gov_source": false,"is_authoritative": true},{"title": "总统府庆祝宪法颁布34周年，呼吁团结促发展；首次将6月20日列为国家法定假日（2026-06-20）","date": "2026-06-20","source_url": "https://www.lanacion.com.py/politica/2026/06/20/ejecutivo-insta-a-la-unidad-para-el-desarrollo-de-paraguay-al-celebrar-34-anos-de-la-jura-de-la-cn/","source_name": "La Nación","summary": "培尼亚总统和副总统阿利亚纳纪念1992年宪法颁布34周年，首次将6月20日列为国家法定节假日。总统强调宪法是巴拉圭民主时代的基础，呼吁各政治力量团结一致推动发展，并重申将把巴拉圭打造成南美洲最具投资吸引力的国家之一。","image_url": null,"is_gov_source": true,"is_authoritative": true},{"title": "西班牙Grupo Costa宣布3亿美元猪肉工厂投资；西大使赞扬巴拉圭宏观经济稳定性（2026-06-18）","date": "2026-06-18","source_url": "https://www.lanacion.com.py/negocios/2026/06/18/espana-destaca-la-estabilidad-economica-de-paraguay-y-ve-mayor-potencial-para-atraer-inversiones/","source_name": "La Nación","summary": "西班牙驻巴大使Javier Parrondo会见经济部长Oscar Lovera后，Grupo Costa宣布3亿美元猪肉生产工厂投资。大使强调巴拉圭宏观经济稳定是吸引投资关键因素，并表明西班牙支持巴拉圭加入OECD。巴拉圭猪肉出口因台湾市场准入已飙升62.6%（1-5月），新增西班牙投资进一步巩固猪肉出口大国的地位。","image_url": null,"is_gov_source": false,"is_authoritative": true},{"title": "高科技产品法（N.º 7546/25）在尚未完全实施前已吸引首个笔记本组装项目落户东方市（2026-06-17）","date": "2026-06-17","source_url": "https://infonegocios.com.py/nota-principal/made-in-paraguay-la-ley-de-bienes-de-alta-tecnologia-atrae-sus-primeros-proyectos-antes-de-entrar-plenamente-en-vigencia/","source_name": "InfoNegocios","summary": "某企业正在评估在东方市设立笔记本组装生产线，受第7546/25号法律驱动（该法促进电子、电气和数字设备在巴拉圭的制造和组装）。要求：最低20%本地整合率（获原产地证书需40%）即可在南共市零关税出口。工商部（MIC）表示该法的实施细则将在数周内完成。这标志着巴拉圭借力南共市原产地规则吸引电子制造业的开端。","image_url": "https://infonegocios.com.py/images/resize/675343-1200x675.webp","is_gov_source": false,"is_authoritative": true}],"impact_analysis": "","user_notes": ""},{"title": "三、社会与安全形势","description": "劳工市场、社会稳定性、治安状况、就业数据","tier": 1,"events": [{"title": "Santa Rita特大武装抢劫案全周发酵：20+持枪歹徒、PCC涉案、爆炸物来自商用采石场、6人被捕（2026-06-16至20）","date": "2026-06-16","source_url": "https://www.abc.com.py/policiales/2026/06/18/megaataque-en-santa-rita-descubren-aguantadero-y-hay-4-detenidos/","source_name": "ABC Color","summary": "6月16日凌晨，20余名持枪歹徒使用50kg炸药同时袭击Santa Rita（Alto Paraná）3家银行和1家换汇所。全周持续发酵：6月18日发现PCC藏匿点并逮捕含巴西籍爆炸专家“Guaraní”（23岁）在内的6人；6月19日在Caacupé抓获第六名嫌犯；6月20日巴西联邦警察在Itaipulândia查获剩余炸药。涉案含现役警察Néstor Ramírez Marín。内政部长Riera宣布“Responsum行动”，部署4,500兵力军事化边境。该事件严重打击公众安全感和边境地区投资信心。","image_url": null,"is_gov_source": false,"is_authoritative": true},{"title": "最低工资僵局以总统行政令解决：上调5%至G. 3,044,000，避免总罢工（2026-06-18）","date": "2026-06-18","source_url": "https://www.infobae.com/america/agencias/2026/06/18/el-gobierno-de-paraguay-oficializa-reajuste-equilibrado-del-5-del-salario-minimo/","source_name": "Infobae","summary": "培尼亚总统绕过Conasam三方机制直接签署行政令上调最低工资5%，7月1日生效。巴拉圭失业率仅3.6%但非正规就业率62.5%、极端贫困率4.1%——最低工资争端折射深层次结构性矛盾。行政令暂时平息了工会的罢工威胁，但企业界批评未遵守《劳动法》规定的三方协商程序。","image_url": null,"is_gov_source": true,"is_authoritative": true},{"title": "Starlink首次落地：100所学校率先在Chaco接入卫星互联网，1600所偏远学校将受益（2026-06-18/19）","date": "2026-06-19","source_url": "https://www.lanacion.com.py/politica/2026/06/19/gobierno-inicia-conectividad-satelital-de-cien-escuelas-en-zonas-alejadas/","source_name": "La Nación","summary": "MITIC和Copaco收到首批Starlink终端（总统培尼亚6月18日在社交媒体发布开箱照片），6月19日启动Chaco地区100所学校部署。在押人员制造天线金属支架（劳动改造项目）。计划覆盖500个战略站点，最终达1,600所学校和社区医疗中心。这是巴拉圭缩小城乡数字鸿沟的标志性举措。","image_url": null,"is_gov_source": true,"is_authoritative": true},{"title": "世界杯热潮：3万球迷涌入亚松森市中心庆祝首胜，19人被捕；球迷自发清理看台获Conmebol赞扬（2026-06-20/21）","date": "2026-06-21","source_url": "https://www.hoy.com.py/nacionales/2026/06/21/desvelada-albirroja-sumo-30000-almas-y-un-punado-de-demorados/","source_name": "HOY","summary": "巴拉圭1-0战胜土耳其后，约3万人涌入亚松森市中心（Panteón Nacional、Calle Palma）庆祝，警方报告19人被拘留，整体秩序良好。在旧金山赛场，巴拉圭球迷比赛结束后自发清理看台垃圾，Conmebol在社交媒体发视频赞扬，比作日本球迷的模范行为。这是本周难得的正面社会和国际形象新闻。","image_url": null,"is_gov_source": false,"is_authoritative": true}],"impact_analysis": "","user_notes": ""},{"title": "四、国际关系与外交动态","description": "巴拉圭与主要国家关系、南共市动态、对华关系进展","tier": 1,"events": [{"title": "培尼亚总统在洛杉矶会见美国国务卿鲁比奥：商讨牛肉专门配额、直航航线、安全与核能合作（2026-06-15）","date": "2026-06-15","source_url": "https://www.ip.gov.py/ip/2026/06/15/pena-discusses-investment-agenda-and-hemispheric-security-with-u-s-secretary-of-state/","source_name": "Agencia IP (Government)","summary": "世界杯巴拉圭vs美国比赛期间，培尼亚总统在洛杉矶会晤美国国务卿Marco Rubio。讨论三大核心议题：① 争取巴拉圭牛肉对美出口专门配额——目前巴拉圭与巴西共享5万吨MFN配额（2025年10月美国曾短暂成为巴拉圭牛肉第一大出口目的地）；② 建立巴拉圭-美国直飞航线；③ 半球安全合作和核能合作。美方代表团还包括运输部长Sean Duffy和国土安全部长Markwayne Mullin。","image_url": null,"is_gov_source": true,"is_authoritative": true},{"title": "台湾副外长陈明祺6天访巴（6月14-19日）：巩固战略伙伴关系，启动2027年建交70周年筹备（2026-06-17）","date": "2026-06-17","source_url": "https://www.ip.gov.py/ip/2026/06/17/paraguay-and-taiwan-strengthen-cooperation-and-strategic-partnership/","source_name": "Agencia IP (Government)","summary": "台湾副外长陈明祺6月14-19日访巴。6月17日与外长Ramírez Lezcano和副外长Víctor Verdún会晤：① 审查网安、AI、Asunción总医院、台湾-巴拉圭理工大学（UPTP）、健康信息系统（HIS）等合作项目；② 筹备2027年两国建交70周年纪念活动；③ 确认巴拉圭将担任联合国大会副主席（2026-2027届）。巴拉圭仍是南美洲唯一与台湾保持外交关系的国家（全球仅余12国）。","image_url": null,"is_gov_source": true,"is_authoritative": true},{"title": "台湾副外长陈明祺会见美国驻巴代办Robert Alter：正式启动台美巴三边AI、5G、智能交通与网安合作框架（2026-06-19）","date": "2026-06-19","source_url": "https://ocacnews.net/article/428134","source_name": "OCAC News (Taiwan)","summary": "陈明祺6月19日会见美国驻巴拉圭临时代办Robert Alter，讨论台美巴三边合作框架：人工智能、5G、智能交通和网络安全。这是继6月15日培尼亚-鲁比奥会晤后，台美巴安全与技术三边合作的具体化推进。三方合作将巴拉圭锁定在美国-台湾地缘技术供应链中，进一步压缩中国大陆企业在巴的电信、AI和数据中心设备市场空间。","image_url": null,"is_gov_source": false,"is_authoritative": true},{"title": "培尼亚总统会见全体外交使团，西班牙大使赞扬巴拉圭稳定性并宣布Grupo Costa 3亿美元投资（2026-06-18）","date": "2026-06-18","source_url": "https://www.lanacion.com.py/politica/2026/06/18/santiago-pena-y-diplomaticos-trazan-planes-de-cooperacion-internacional-para-paraguay/","source_name": "La Nación","summary": "培尼亚总统在教廷大使馆会见全体外交使团，讨论公共卫生、公民安全、教育、经济发展等国际合作领域。同日西班牙大使Javier Parrondo会见经济部长Lovera，赞扬巴拉圭宏观经济稳定性，宣布Grupo Costa 3亿美元猪肉工厂投资，并表态西班牙支持巴拉圭加入OECD。","image_url": null,"is_gov_source": false,"is_authoritative": true},{"title": "巴拉圭-菲律宾首次元首国事访问：签署相互免签协定和商会MOU（2026-06-18）","date": "2026-06-18","source_url": "https://bilyonaryo.com/2026/06/18/paraguays-santiago-pena-explores-intramuros-in-first-ever-state-visit-to-philippines/social-fancy/","source_name": "Bilyonaryo Business News","summary": "培尼亚总统对菲律宾进行巴拉圭史上首次国事访问（两国1962年建交）。签署：① 普通护照持有人相互免签协定；② 外交培训MOU；③ 菲律宾工商会（PCCI）与REDIEX间商会MOU。两国讨论旅游、贸易、文化交流等合作。巴拉圭本周同期推进台湾、日本、菲律宾三条亚洲外交线——亚洲多元化战略加速实施。","image_url": null,"is_gov_source": false,"is_authoritative": true},{"title": "南共市峰会定于6月29-30日在亚松森CONMEBOL总部举行；乌拉圭接任临时主席国，阿根廷总统米莱不出席（2026-06）","date": "2026-06-20","source_url": "https://www.mercosur.int/avanza-el-proceso-de-ratificacion-del-acuerdo-de-libre-comercio-entre-el-mercosur-y-la-efta/","source_name": "Mercosur","summary": "第67届南共市总统峰会确认于6月29-30日在卢克CONMEBOL总部举行，纪念《亚松森条约》签署35周年。重点议程：南共市-欧盟临时贸易协定执行进展（5月1日生效）、南共市-EFTA协定推进、阿联酋FTA谈判。阿根廷总统米莱确认不出席；乌拉圭接任临时主席国。ARP肉类委员会主席Mario Balmelli（6月18日）指出巴拉圭牛肉出口可翻番但受制于制度性挑战。","image_url": null,"is_gov_source": true,"is_authoritative": true}],"impact_analysis": "","user_notes": ""},{"title": "五、行业专题：通讯、运营商、数字能源与AI","description": "5G频谱与商用进展、光纤基础设施、数字能源投资、AI数据中心建设、行业政策","tier": 1,"events": [{"title": "ANDE推进首座大型太阳能电站招标（Loma Plata, Boquerón, 140MW），获世界银行技术支持（2026-06-18）","date": "2026-06-18","source_url": "https://www.lanacion.com.py/negocios/2026/06/18/ande-avanza-en-la-licitacion-para-la-adquisicion-de-energia-de-primera-planta-solar/","source_name": "La Nación","summary": "ANDE总裁Félix Sosa主持与世界银行的会议，完善Loma Plata（Boquerón省）140MW太阳能光伏电站招标文件。这是新《可再生能源法》（第6034号法令，5月19日实施）的首个重大执行案例。背景：电力需求三年增长约50%，ANDE总裁此前警告须在100%水电耗尽前引入新发电来源。对中国光伏和储能设备出口企业是直接市场机会。","image_url": null,"is_gov_source": false,"is_authoritative": true},{"title": "台湾副外长陈明祺视察台巴AI数据中心选址和Itaipú水电站，评估能源供给能力（2026-06-19）","date": "2026-06-19","source_url": "https://www.lanacion.com.py/politica/2026/06/19/vicecanciller-taiwanes-visito-la-futura-sede-del-data-center-binacional-de-ia-en-paraguay/","source_name": "La Nación","summary": "台湾副外长陈明祺于6月19日视察台巴合资AI数据中心选址地，并与MITIC部长Gustavo Villate商讨项目实施。同日视察Itaipú水电站（14,000MW，全球第二大）评估清洁能源供给能力，以及台湾驻东方市总领事馆。该项目首阶段投资200-300M美元，台巴各50%合资，首期10MW容量，采用台湾Nvidia GPU设备，计划2027年底前投入运营。已接洽Google、Microsoft和Amazon。","image_url": null,"is_gov_source": false,"is_authoritative": true},{"title": "首批Starlink终端运抵并即日部署：100所学校在Chaco接入卫星互联网，最终覆盖1,600所学校+医疗中心（2026-06-18/19）","date": "2026-06-19","source_url": "https://www.ip.gov.py/ip/2026/06/18/paraguay-inicia-despliegue-de-equipos-starlink-para-dar-conectividad-a-1-600-escuelas-de-comunidades-alejadas/","source_name": "Agencia IP (Government)","summary": "MITIC与Copaco联合推进的Starlink项目首批终端于6月18日运抵亚松森（总统培尼亚在社交媒体发布开箱照片），6月19日启动在Chaco地区100所学校的部署，覆盖500个战略站点。在押人员制造天线金属支架作为劳动改造项目。结合+Móvil与Starlink的移动卫星网络合作（南美首例），卫星通信正成为弥补Copaco光纤骨干网建设严重延误的关键替代方案。","image_url": null,"is_gov_source": true,"is_authoritative": true},{"title": "BNamericas专访Atis Group CEO：巴拉圭5G部署处于早期阶段，Claro和Nubicom已获牌照；Atis计划年增10%铁塔（2026-06-16）","date": "2026-06-16","source_url": "https://www.bnamericas.com/en/interviews/atis-group-we-expect-to-increase-our-site-count-by-at-least-10-a-year","source_name": "BNamericas","summary": "Atis Group创始人兼CEO Juan Pablo Blanco接受BNamericas专访（6月16日发布）：① 巴拉圭是Atis三个市场（阿根廷、乌拉圭、巴拉圭）中5G部署起步最晚的，刚进入早期阶段，Claro和Nubicom已获牌照开始部署；② Atis在三国拥有1,000+铁塔，计划年增至少10%；③ 主要客户为Millicom（Tigo）、Telecom Argentina（Personal）、Claro和Antel，占收入99.9%；④ 开发了适配城市环境的新型隐蔽式铁塔设计并从阿根廷出口至巴拉圭。BID Invest正在考虑对Atis投资最多1,000万美元用于铁塔扩张。","image_url": null,"is_gov_source": false,"is_authoritative": true},{"title": "CONATEL宣布数字电视招标流标：零投标参与，短期内不再重开——高成本和社交媒体竞争导致投资者望而却步（2026-06-19）","date": "2026-06-19","source_url": "https://dplnews.com/paraguay-conatel-declara-desierta-licitacion-tv/","source_name": "DPL News","summary": "CONATEL宣布数字地面电视（TDT）牌照公开招标（GR Nº 03/2025）流标——零投标参与。无线电通信经理Martín Gómez指出仅初始设备投资就超200万美元（不含铁塔用地成本），加上社交媒体竞争使投资回报前景黯淡。4家企业此前购买了标书（每份G. 1,000,000不退费）但无一提交正式投标。CONATEL表示至少5年内不会再举行TDT招标。这是继5G拍卖仅2家参与后，CONATEL的又一招标挫折。","image_url": "https://dplnews.com/wp-content/uploads/2026/06/Gemini_Generated_Image_2s4av12s4av12s4a-1024x572.png","is_gov_source": false,"is_authoritative": true},{"title": "El Niño预警对水电产能和能源安全的潜在影响：MAG 6月18日警告强El Niño将持续至2027年4月（2026-06-20）","date": "2026-06-20","source_url": "https://www.latribuna.com.py/negocios/economia/2026/06/20/el-nino-azotara-al-campo-paraguayo-y-causara-estragos-hasta-abril-de-2027/","source_name": "La Tribuna","summary": "La Tribuna 6月20日长篇分析：MAG于6月18日发布的中强El Niño预警不仅威胁农业，也会影响水电产能。过量降雨短期可能增加流量，但长期水库管理复杂化将影响Itaipú和Yacyretá的电网稳定性。对于99%电力来自水电并依赖廉价清洁能源吸引AI数据中心的巴拉圭，El Niño给电力供应稳定性带来额外不确定性。ANDE是否将El Niño因素纳入Loma Plata太阳能加速招标的决策背景值得关注。","image_url": null,"is_gov_source": false,"is_authoritative": true}],"impact_analysis": "","user_notes": ""},{"title": "六、主要客户动向","description": "跟踪巴拉圭主要客户的最新战略布局、投资计划、网络建设和技术选型","tier": 1,"events": [{"title": "Copaco/MITIC启动Starlink全国部署：首批100所学校在Chaco接入，1,600所偏远学校将受益（2026-06-18/19）","date": "2026-06-19","source_url": "https://www.ip.gov.py/ip/2026/06/18/paraguay-inicia-despliegue-de-equipos-starlink-para-dar-conectividad-a-1-600-escuelas-de-comunidades-alejadas/","source_name": "Agencia IP (Government)","summary": "国有电信公司Copaco与MITIC合作，6月18日收到首批Starlink终端，6月19日启动Chaco地区100所学校部署。总统培尼亚在社交媒体发布开箱照片。在押人员制造天线金属支架。Copaco借此弥补其国家DWDM光纤骨干网建设严重延误的短板——此前Paraguay Ciberseguro主任批评该骨干网为不可用的制度神话，边境地区实际依赖巴西光纤。Starlink卫星方案在短期内成为Copaco实现偏远地区覆盖的唯一可行路径。","image_url": null,"is_gov_source": true,"is_authoritative": true},{"title": "Atis Group确认巴拉圭5G部署已启动：与Tigo、Claro、Personal三家运营商均签有铁塔合同（2026-06-16）","date": "2026-06-16","source_url": "https://www.bnamericas.com/en/interviews/atis-group-we-expect-to-increase-our-site-count-by-at-least-10-a-year","source_name": "BNamericas","summary": "Atis Group CEO Juan Pablo Blanco在6月16日BNamericas专访中确认：① 巴拉圭已进入5G部署早期阶段，Claro和Nubicom持有牌照并开始建设；② Atis在巴拉圭与Tigo（Millicom）、Claro（América Móvil）和Personal（Telecom Argentina）均有铁塔共享合同，三大运营商合计贡献其99.9%收入；③ 计划年增至少10%铁塔数量；④ 已将阿根廷开发的城市隐蔽式铁塔设计出口至巴拉圭。BID Invest正考虑对Atis投资最多1,000万美元。铁塔基础设施的扩张速度是评估5G商用时间表的关键先行指标。","image_url": null,"is_gov_source": false,"is_authoritative": true},{"title": "Tigo Paraguay（320万用户/47.3%份额）：5G受限但铁塔共享和移动金融持续布局；Twilio/Sinch短信中断事件引发关注（2026-06）","date": "2026-06-20","source_url": "https://isdown.app/status/twilio/incidents/605525-sms-delivery-delays-from-twilio-phone-numbers-to-tigo-paraguay","source_name": "isdown.app / Twilio Status","summary": "Tigo以320万用户维持47.3%移动市场份额，但因其网络使用华为设备被排除在5G拍卖之外。6月11-12日连续发生两起短信中断：Twilio报告向Tigo Paraguay发送短信延迟约14小时（6月11日），Sinch报告约17小时中断（6月12日），影响企业短信、金融验证和客户通知。Tigo正加大Tigo Money移动钱包和保险业务以寻求5G受限环境下的增长。母公司Millicom股价一年上涨126%，市值约145亿美元。世界杯转播权（Tigo Sports 100/101/102频道独家直播巴拉圭全部比赛）是核心差异化优势。","image_url": null,"is_gov_source": false,"is_authoritative": true},{"title": "Claro巴拉圭（80万用户）：5G商用率先启动（Nokia设备，3500万美元），世界杯免费直播104场比赛（2026-06）","date": "2026-06-20","source_url": "https://www.samenacouncil.org/samena_daily_news?news=108810","source_name": "SAMENA Daily News","summary": "Claro（América Móvil）率先在巴拉圭激活5G商用网络，覆盖Gran Asunción、Ciudad del Este、Encarnación等主要城市，采用Nokia Massive MIMO设备，初始投资3,500万美元。公司获3.5-3.7GHz频段200MHz频谱（拍得价202.1万美元）。ClaroTV同步向光纤和卫星客户免费直播全部104场世界杯比赛。母公司América Móvil在拉美15国拥有2.5亿无线用户。（注：5G商用发布于2026年3-4月，本周World Cup转播为Claro持续增强市场能见度的事件。）","image_url": null,"is_gov_source": false,"is_authoritative": true},{"title": "Personal（原Núcleo，240万用户/35%份额）：华为设备致5G出局，专注低价策略；母公司Telecom Argentina专注本土（2026-06）","date": "2026-06-20","source_url": "https://dplnews.com/paraguay-nueva-subasta-5g-mantiene-restriccion-huawei/","source_name": "DPL News","summary": "Personal（Telecom Argentina子公司，原Núcleo）拥有240万用户（35.5%市场份额），为巴拉圭第二大移动运营商。网络使用华为设备，与Tigo同样被排除于5G拍卖之外。Personal以低价策略竞争（5GB+社交媒体套餐仅25,000瓜拉尼/约3美元），但在5G和农村光纤覆盖方面严重落后。Telecom Argentina正集中资源于阿根廷本土市场，巴拉圭子公司战略投入有限。全市场83%的移动用户目前无法接入5G——这是巴拉圭电信监管面临的最大结构性挑战。","image_url": null,"is_gov_source": false,"is_authoritative": true},{"title": "Nubicom：获200MHz 5G频谱（3.3-3.5GHz），宣布2亿美元全国部署计划但须从零建网（2026-06）","date": "2026-06-20","source_url": "https://www.datacenterdynamics.com/en/news/?tag=nubicom","source_name": "Data Center Dynamics","summary": "Nubicom（阿根廷Salta省固网运营商）在2025年8月CONATEL拍卖中以200万美元获得200MHz 5G频谱（3.3-3.5GHz），宣布2亿美元全国部署计划——巴拉圭最大规模5G部署承诺。但面临巨大执行挑战：须在6周内在巴拉圭设立本地子公司，且从零建设移动网络（目前全无移动基础设施）。CONATEL要求每100MHz频谱安装至少100个基站（10%须服务政府机关）。Nubicom品牌认知度为零，缺乏移动网络运营经验。Atis Group（6月16日BNamericas专访）确认Claro和Nubicom为巴拉圭5G部署的两个先行者。","image_url": null,"is_gov_source": false,"is_authoritative": true}],"impact_analysis": "","user_notes": ""},{"title": "七、对企业经营的综合影响分析","description": "综合宏观环境、行业态势及客户动向，从成本、市场、合规维度分析企业影响","tier": 2,"events": [],"impact_analysis": "【成本维度】\n\n🟡 汇率稳定利好进口：本周瓜拉尼兑美元稳定在G. 6,100水平，BCP预计6-7月波动区间G. 6,100-6,200。瓜拉尼是拉美波动率最低的货币（标准差0.38%），外汇远期市场同比增长44%至12.06亿美元，进口设备/原材料成本可控。\n\n🟡 工资成本温和上升：最低工资上调5%至G. 3,044,000（两倍于CPI 2.4%），7月1日生效。上调幅度适中，不致对企业用工成本造成显著冲击。巴拉圭劳动力成本仍为南美洲最低之一。\n\n🟢 融资成本改善：MEF 6月24日国债拍卖受益于投资级评级（Fitch/Moody's/S&P），主权EMBI利差处于110-120bp历史低位。但民营部门融资成本仍显著高于主权信用指标。\n\n🔴 El Niño = 能源与农业双重风险：MAG 6月18日发布中强El Niño预警（持续至2027年4月）。对依赖水电（99%）的能源密集型项目（数据中心、AI）而言，长期水库管理和电力稳定性存在不确定性。农产品价格上行风险也将传导至食品加工和物流成本。La Tribuna 6月20日长篇分析特别强调了水电产能的潜在影响。\n\n【市场维度】\n\n🟢 出口增长强劲 + 出口多元化取得里程碑突破：1-5月出口79.1亿美元（+16.4%），大豆+48%、猪肉+62.6%。本周两大出口里程碑：巴拉圭首次出口羊肉至阿联酋（6月18日，12吨，Frigorífico Victoria）；西班牙Grupo Costa宣布3亿美元猪肉工厂（6月18日）。\n\n🟢 外交加速多元化：本周外交成果密集——培尼亚会见美国国务卿鲁比奥（6月15日）、台湾副外长陈明祺6天访巴（6月14-19日）、巴拉圭首次对菲律宾国事访问（6月18日）、台美巴三边AI/5G/网安合作启动（6月19日）。南共市峰会（6月29-30日）即将举行——EU协定（5月1日生效）和UAE FTA将进一步释放市场机会。\n\n🟡 5G部署缓慢但铁塔基础设施扩张先行：Atis Group CEO确认巴拉圭5G处于早期阶段，Claro和Nubicom已启动部署。但Tigo（47.3%）和Personal（35%）被排除——全市场83%用户无法接入5G。Atis计划年增10%铁塔，BID Invest正考虑1,000万美元投资。铁塔扩张速度是判断5G商用时间表的关键先行指标。\n\n🟡 CONATEL连续招标挫折：继5G拍卖仅2家参与后，TDT数字电视招标零投标流标（6月19日），CONATEL表示至少5年内不重开。监管机构在数字化转型中的执行力存疑。\n\n🟢 数据中心/AI长期增长逻辑强化，但短期内增不确定性：台湾副外长6月19日视察台巴AI数据中心选址并评估Itaipú能源能力，首期200-300M美元。但电价法令废除（6月10日）+ El Niño水电风险（6月18日）为大规模投资注入双重不确定性。\n\n🟢 卫星互联网填补光纤空白：Starlink终端首批到货（6月18日）、100所学校即日部署（6月19日）。Copaco借此弥补其光纤骨干网建设严重延误的短板。对需要可靠连接的企业，卫星+光纤双模方案值得评估。\n\n🟢 电子制造业新机遇：第7546/25号高科技产品法在尚未完全实施前已吸引首个笔记本组装项目评估（6月17日）。20%本地整合即可获得南共市原产地证书和零关税准入——巴拉圭有望成为南共市电子制造新节点。\n\n【合规维度】\n\n🟡 最低工资以行政令方式解决——政策执行可预测性增强：Conasam三方僵局以总统行政令干预结束，避免了总罢工风险。政府在CPI 2.4%的背景下选择5%温和调升，展现出务实平衡姿态。但企业界批评未遵守《劳动法》三方协商程序。\n\n🔴 台美巴三边技术合作正式启动——中国电信企业准入继续被系统化封锁：台湾副外长陈明祺6月19日与美国临时代办建立三方AI+5G+网安合作框架。5G华为限制条款将继续严格执行，Tigo/Personal被迫停留在4G。中国通信设备在巴拉圭市场面临的结构性壁垒进一步固化。\n\n🔴 Santa Rita特大武装抢劫案暴露公共安全短板——PCC跨国犯罪渗透：全周持续发酵（6月16-20日），6人被捕含PCC爆炸专家，现役警察涉案。内政部部署4,500兵力军事化东部边境。对Alto Paraná地区投资环境信心构成负面影响。\n\n🟢 数据保护与AI法规持续推进：待出台数据中心法将为投资提供法律确定性。高科技产品法实施细则即将完成。对合规运营的企业而言是利好。","user_notes": ""},{"title": "八、对中资企业的专项影响与建议","description": "针对中资企业的特殊风险与机遇分析，包括政策风险、外交风险、营商建议","tier": 2,"events": [],"impact_analysis": "【风险分析】\n\n🔴 高风险：5G/电信设备市场准入被进一步系统化锁定\n本周台湾副外长陈明祺与美方临时代办正式建立了台美巴三边AI+5G+网安合作框架（6月19日）。CONATEL 5G拍卖的华为/中兴限制条款在可预见的未来不会松动。Tigo和Personal（合计82.5%用户）被排除在5G之外这一窘境虽商业上不可持续，但政策调整需重大地缘政治转变。CONATEL数字电视招标也宣告流标（6月19日），监管执行力存疑。\n建议：① 跟踪Atis Group等独立铁塔公司的扩张进度——作为运营商中立的基础设施方，铁塔共享模式可能为设备间接供应开辟通道；② 探索非5G领域：数据中心基础设施（服务于台巴AI中心、HIVE Digital等）、光纤传输/DWDM骨干网（Copaco建设严重延误=市场缺口）、企业专网、可再生能源微电网通信；③ 探索通过南共市国家（巴西、阿根廷）子公司或合资架构合规进入的路径。\n\n🔴 高风险：外交张力持续且加深\n本周同时出现培尼亚-鲁比奥会晤（6月15日）、台湾副外长6天访巴（6月14-19日）、台美巴三边AI/5G协议（6月19日）——巴拉圭被更深地锁定在美国-台湾战略轨道中。但日本企业（东京研讨会6月11日，日巴投资协定6月23日众议院表决）和菲律宾（首次元首访问6月18日）的积极推进也表明巴拉圭正在多元化亚洲伙伴关系。\n建议：将商业活动与政治关系完全分离；避免触碰政府敏感项目。关注第三方渠道（南共市框架、意大利/西班牙贸易通道）可能形成的间接经济联系。\n\n🟡 中风险：El Niño可能影响工程和能源项目交付\nMAG 6月18日预警 + La Tribuna 6月20日深入分析均指出水电产能和基础设施施工面临气候风险。若中资企业计划在巴拉圭部署数据中心或大型工业项目，须将El Niño风险纳入工期和成本模型。\n\n【机遇分析】\n\n🟢 重大机遇：可再生能源设备市场 —— ANDE 140MW太阳能招标是明确信号\nANDE于6月18日与世界银行推进Loma Plata 140MW太阳能招标文件完善。新《可再生能源法》（第6034号）为非水可再生能源提供首个法律框架。电力需求三年增长约50%，ANDE总裁明确呼吁投资替代能源。中国在光伏板、风机和储能领域拥有全球成本领先优势——巴拉圭非水可再生能源领域从零起步。\n建议：① 立即对接ANDE太阳能/生物质能招标项目；② 提供分布式光伏+储能工业园区解决方案（满足数据中心和大型工业用户需求）；③ 参与巴拉圭首轮可再生能源拍卖——该领域目前没有中国企业的地缘政治壁垒。\n\n🟢 重大机遇：数据中心和光纤基础设施（非5G领域）\n台巴AI数据中心（首期200-300M美元）进入选址阶段并完成Itaipú能源评估（6月19日）；HIVE Digital BUZZ Cloud上线；X8 Cloud大规模项目推进中；Atis Group计划年增10%铁塔。虽然5G无线接入受限，但数据中心配套设备（服务器、制冷系统、电源管理）、光纤传输网络（Copaco骨干网严重延误=市场缺口）和企业专网面临较少地缘政治限制。\n建议：对接台巴AI中心（MITIC/台湾ICDF）、HIVE Digital、Dominion等现有项目的设备供应需求。\n\n🟢 机遇：Starlink卫星通信生态中的配套设备和服务机会\n首批1,600套Starlink终端6月18-19日到货并启动部署。Copaco光纤骨干网不完善意味着卫星通信需求将长期存在。配套的安装服务、本地网络集成、太阳能供电系统、天线支架等在押人员制造产能有限的环节存在差异化切入空间。\n\n🟢 新机遇：电子制造组装——第7546/25号法律窗口\n该法在完全实施前已吸引首个笔记本组装项目评估（6月17日，InfoNegocios报道）。20%本地整合率即可获南共市原产地证书（零关税准入7亿消费者市场）。巴拉圭电价较巴西低2.8倍+劳动力成本优势+南共市通道。对于寻求绕开直接对巴出口地缘政治敏感性的中国电子制造企业，通过来料加工模式在东方市设立组装线是值得评估的选项。\n\n【行动建议】\n\n【立即（1-2周）】：① 深入研究ANDE Loma Plata 140MW太阳能招标的技术参数和投标条件；② 对接台巴AI数据中心项目方（MITIC/台湾ICDF），探讨数据中心设备和解决方案供应；③ 出席6月29-30日南共市峰会（CONMEBOL，卢克），观察区域政策和贸易走向。\n\n【短期（1-3个月）】：④ 建立与ANDE可再生能源部门的直接联系，寻求太阳能+储能试点项目；⑤ 评估在东方市利用第7546/25号法律设立电子组装设施的可行性（笔记本、光伏组件、电气设备），借道南共市+EU零关税协定覆盖7亿消费者；⑥ 联系Atis Group了解铁塔基础设施的设备采购需求。\n\n【中期（3-12个月）】：⑦ 锁定1-2个可再生能源领域标杆项目（太阳能电站或分布式储能）；⑧ 基于El Niño气候走向和电力政策变化重新评估更广泛的市场进入策略；⑨ 考虑通过南共市区域联动（巴西/阿根廷子公司）降低地缘政治敏感性。","user_notes": ""}]},"en": {"topic": "Paraguay Briefing","time_span": "June 15 – June 21, 2026","tiers": [{"name": "第一部分：主要资讯和动态","description": "巴拉圭宏观经济、政治政策、社会安全、国际关系、行业专题及主要客户最新动态"},{"name": "第二部分：形势分析和行动建议","description": "综合外部宏观环境、行业态势及客户动向，提出企业影响评估与中资企业专项建议"}],"sections": [{"title": "一、宏观经济动态","description": "GDP增速、通货膨胀率、汇率波动、货币政策、财政状况、主要产业表现","tier": 1,"events": [{"title": "MEF将于6月24日举行新一轮国债拍卖，重开2028/2030/2035年期系列（2026-06-18）","date": "2026-06-18","source_url": "https://www.lanacion.com.py/negocios/2026/06/18/mef-prepara-nueva-emision-de-bonos-del-tesoro-en-el-mercado-local/","source_name": "La Nación","summary": "巴拉圭经济财政部筹备2026年第二轮国债拍卖（6月24日），重新开放2028年、2030年和2035年到期系列。受益于Fitch、Moody's和S&P三大机构授予的投资级评级，主权融资成本降至历史低位，EMBI利差约110-120bp。","image_url": "https://www.lanacion.com.py/resizer/v2/6Z2JY7G5O5DV5F3RH3GJ7F4T4M.jpg?auth=7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e&width=1200&height=630&smart=true","is_gov_source": false,"is_authoritative": true},{"title": "瓜拉尼兑美元稳定在G. 6,100水平，BCP预计6-7月波动区间G. 6,100-6,200（2026-06-19）","date": "2026-06-19","source_url": "https://www.lanacion.com.py/negocios/2026/06/19/el-dolar-flucturo-alrededor-de-los-g-6100-durante-la-semana/","source_name": "La Nación","summary": "本周美元兑瓜拉尼在G. 6,100附近波动，BCP参考汇率G. 6,093.69。BCP预计6-7月汇率在G. 6,100至G. 6,200区间运行。瓜拉尼仍是拉美波动率最低的货币之一，外汇远期市场同比增长44%至12.06亿美元，进口设备和原材料成本可控。","image_url": null,"is_gov_source": false,"is_authoritative": true},{"title": "MAG发布中强El Niño预警：持续至2027年4月；大豆（占出口42.2%）和牛肉（13.7%）是最大风险敞口（2026-06-18）","date": "2026-06-18","source_url": "https://www.infobae.com/america/agencias/2026/06/18/ministerio-paraguayo-advierte-de-una-alta-probabilidad-de-un-fuerte-fenomeno-de-el-nino/","source_name": "Infobae / EFE","summary": "农业部（MAG）宣布El Niño发生概率极高，预计6月抵达，持续6-9个月至2027年4月。风险包括：过量降雨引发洪涝、真菌病害和虫害增加、牲畜热应激和寄生虫疾病。2026年GDP增长仍预计4%+（Itaú 4.0%、BCP 4.2%、世界银行4.4%），但2027年展望显著承压。农业前景乐观（大豆出口+48%）与El Niño风险并存。","image_url": null,"is_gov_source": true,"is_authoritative": true},{"title": "巴拉圭首次出口羊肉至阿联酋：12吨，历史性里程碑（2026-06-18/19）","date": "2026-06-18","source_url": "https://www.ip.gov.py/ip/2026/06/18/paraguay-concreto-primera-exportacion-de-carne-ovina-a-los-emiratos-arabes-unidos/","source_name": "Agencia IP (Government)","summary": "Frigorífico Victoria完成巴拉圭历史上首次羊肉出口，12吨销往阿联酋。SENACSA主席José Carlos Martin称这是三年努力的成果。阿联酋年进口羊肉超4万吨（价值3亿美元+），印度、南非、肯尼亚为主要供应商。此前巴拉圭已获以色列（2025年）和新加坡市场准入。出口多元化进程加速：牛肉（美国、台湾、智利）、猪肉（台湾，+62.6%）、羊肉（阿联酋）。","image_url": null,"is_gov_source": true,"is_authoritative": true},{"title": "总统签署最低工资上调5%行政令至G. 3,044,000（7月1日生效），巴拉圭升至南美第三高（2026-06-18）","date": "2026-06-18","source_url": "https://www.lanacion.com.py/negocios/2026/06/18/ejecutivo-emite-decreto-de-suba-del-salario-minimo/","source_name": "La Nación","summary": "培尼亚总统签署第6225号法令，最低工资上调5%至G. 3,044,000（日薪G. 117,077），7月1日起生效。上调幅度两倍于CPI 2.4%，使巴拉圭最低工资升至南美洲第三高。此前Conasam三方谈判破裂（工会要求+20%、雇主方沉默），总统绕过三方机制直接干预，避免了总罢工风险。","image_url": "https://www.lanacion.com.py/resizer/v2/ORLANDO-GILL-ATAJADA.jpg?auth=f9e78ea9c306b9a905a8760c192da9f5999d1d67e343d07f0abf9474389a802e&width=1200&height=630&smart=true","is_gov_source": true,"is_authoritative": true}],"impact_analysis": "","user_notes": ""},{"title": "二、政治与政策变化","description": "重大立法、政策调整、外资政策、税制改革、投资激励","tier": 1,"events": [{"title": "总统通过行政令打破最低工资僵局：上调5%，工会原要求+20%，雇主方沉默（2026-06-18）","date": "2026-06-18","source_url": "https://www.lanacion.com.py/negocios/2026/06/18/ejecutivo-emite-decreto-de-suba-del-salario-minimo/","source_name": "La Nación","summary": "面对Conasam三方谈判破裂，培尼亚总统直接颁布第6225号行政令。该决策平衡了劳工诉求与商业成本：上调幅度两倍于CPI 2.4%但远低于工会20%要求。行政令绕开了6月17日会谈失败后工会威胁的总罢工，政府展现出务实干预风格——也是本届政府首次在不经三方共识的情况下独自决定最低工资。","image_url": "https://www.lanacion.com.py/resizer/v2/ORLANDO-GILL-ATAJADA.jpg?auth=f9e78ea9c306b9a905a8760c192da9f5999d1d67e343d07f0abf9474389a802e&width=1200&height=630&smart=true","is_gov_source": true,"is_authoritative": true},{"title": "众议院6月23日将审议14项议案：巴拉圭-日本投资促进协定、南共市领事合作协定等（2026-06-19）","date": "2026-06-19","source_url": "https://www.lanacion.com.py/politica/2026/06/19/diputados-preve-el-estudio-de-14-puntos-en-sesion-del-martes-23/","source_name": "La Nación","summary": "众议院定于6月23日召开全体会议，审议14项议案。核心项目：① 巴拉圭-日本促进投资协定（6月11日东京100+日本企业高管研讨会后的立法跟进）；② 南共市领事合作协定；③ 工程履约保证金利息支付等。日本协定将为日本企业在巴投资提供法律保障——日本大使此前称大型日企正将巴拉圭视为南美洲投资和出口基地。","image_url": null,"is_gov_source": false,"is_authoritative": true},{"title": "总统府庆祝宪法颁布34周年，呼吁团结促发展；首次将6月20日列为国家法定假日（2026-06-20）","date": "2026-06-20","source_url": "https://www.lanacion.com.py/politica/2026/06/20/ejecutivo-insta-a-la-unidad-para-el-desarrollo-de-paraguay-al-celebrar-34-anos-de-la-jura-de-la-cn/","source_name": "La Nación","summary": "培尼亚总统和副总统阿利亚纳纪念1992年宪法颁布34周年，首次将6月20日列为国家法定节假日。总统强调宪法是巴拉圭民主时代的基础，呼吁各政治力量团结一致推动发展，并重申将把巴拉圭打造成南美洲最具投资吸引力的国家之一。","image_url": null,"is_gov_source": true,"is_authoritative": true},{"title": "西班牙Grupo Costa宣布3亿美元猪肉工厂投资；西大使赞扬巴拉圭宏观经济稳定性（2026-06-18）","date": "2026-06-18","source_url": "https://www.lanacion.com.py/negocios/2026/06/18/espana-destaca-la-estabilidad-economica-de-paraguay-y-ve-mayor-potencial-para-atraer-inversiones/","source_name": "La Nación","summary": "西班牙驻巴大使Javier Parrondo会见经济部长Oscar Lovera后，Grupo Costa宣布3亿美元猪肉生产工厂投资。大使强调巴拉圭宏观经济稳定是吸引投资关键因素，并表明西班牙支持巴拉圭加入OECD。巴拉圭猪肉出口因台湾市场准入已飙升62.6%（1-5月），新增西班牙投资进一步巩固猪肉出口大国的地位。","image_url": null,"is_gov_source": false,"is_authoritative": true},{"title": "高科技产品法（N.º 7546/25）在尚未完全实施前已吸引首个笔记本组装项目落户东方市（2026-06-17）","date": "2026-06-17","source_url": "https://infonegocios.com.py/nota-principal/made-in-paraguay-la-ley-de-bienes-de-alta-tecnologia-atrae-sus-primeros-proyectos-antes-de-entrar-plenamente-en-vigencia/","source_name": "InfoNegocios","summary": "某企业正在评估在东方市设立笔记本组装生产线，受第7546/25号法律驱动（该法促进电子、电气和数字设备在巴拉圭的制造和组装）。要求：最低20%本地整合率（获原产地证书需40%）即可在南共市零关税出口。工商部（MIC）表示该法的实施细则将在数周内完成。这标志着巴拉圭借力南共市原产地规则吸引电子制造业的开端。","image_url": "https://infonegocios.com.py/images/resize/675343-1200x675.webp","is_gov_source": false,"is_authoritative": true}],"impact_analysis": "","user_notes": ""},{"title": "三、社会与安全形势","description": "劳工市场、社会稳定性、治安状况、就业数据","tier": 1,"events": [{"title": "Santa Rita特大武装抢劫案全周发酵：20+持枪歹徒、PCC涉案、爆炸物来自商用采石场、6人被捕（2026-06-16至20）","date": "2026-06-16","source_url": "https://www.abc.com.py/policiales/2026/06/18/megaataque-en-santa-rita-descubren-aguantadero-y-hay-4-detenidos/","source_name": "ABC Color","summary": "6月16日凌晨，20余名持枪歹徒使用50kg炸药同时袭击Santa Rita（Alto Paraná）3家银行和1家换汇所。全周持续发酵：6月18日发现PCC藏匿点并逮捕含巴西籍爆炸专家“Guaraní”（23岁）在内的6人；6月19日在Caacupé抓获第六名嫌犯；6月20日巴西联邦警察在Itaipulândia查获剩余炸药。涉案含现役警察Néstor Ramírez Marín。内政部长Riera宣布“Responsum行动”，部署4,500兵力军事化边境。该事件严重打击公众安全感和边境地区投资信心。","image_url": null,"is_gov_source": false,"is_authoritative": true},{"title": "最低工资僵局以总统行政令解决：上调5%至G. 3,044,000，避免总罢工（2026-06-18）","date": "2026-06-18","source_url": "https://www.infobae.com/america/agencias/2026/06/18/el-gobierno-de-paraguay-oficializa-reajuste-equilibrado-del-5-del-salario-minimo/","source_name": "Infobae","summary": "培尼亚总统绕过Conasam三方机制直接签署行政令上调最低工资5%，7月1日生效。巴拉圭失业率仅3.6%但非正规就业率62.5%、极端贫困率4.1%——最低工资争端折射深层次结构性矛盾。行政令暂时平息了工会的罢工威胁，但企业界批评未遵守《劳动法》规定的三方协商程序。","image_url": null,"is_gov_source": true,"is_authoritative": true},{"title": "Starlink首次落地：100所学校率先在Chaco接入卫星互联网，1600所偏远学校将受益（2026-06-18/19）","date": "2026-06-19","source_url": "https://www.lanacion.com.py/politica/2026/06/19/gobierno-inicia-conectividad-satelital-de-cien-escuelas-en-zonas-alejadas/","source_name": "La Nación","summary": "MITIC和Copaco收到首批Starlink终端（总统培尼亚6月18日在社交媒体发布开箱照片），6月19日启动Chaco地区100所学校部署。在押人员制造天线金属支架（劳动改造项目）。计划覆盖500个战略站点，最终达1,600所学校和社区医疗中心。这是巴拉圭缩小城乡数字鸿沟的标志性举措。","image_url": null,"is_gov_source": true,"is_authoritative": true},{"title": "世界杯热潮：3万球迷涌入亚松森市中心庆祝首胜，19人被捕；球迷自发清理看台获Conmebol赞扬（2026-06-20/21）","date": "2026-06-21","source_url": "https://www.hoy.com.py/nacionales/2026/06/21/desvelada-albirroja-sumo-30000-almas-y-un-punado-de-demorados/","source_name": "HOY","summary": "巴拉圭1-0战胜土耳其后，约3万人涌入亚松森市中心（Panteón Nacional、Calle Palma）庆祝，警方报告19人被拘留，整体秩序良好。在旧金山赛场，巴拉圭球迷比赛结束后自发清理看台垃圾，Conmebol在社交媒体发视频赞扬，比作日本球迷的模范行为。这是本周难得的正面社会和国际形象新闻。","image_url": null,"is_gov_source": false,"is_authoritative": true}],"impact_analysis": "","user_notes": ""},{"title": "四、国际关系与外交动态","description": "巴拉圭与主要国家关系、南共市动态、对华关系进展","tier": 1,"events": [{"title": "培尼亚总统在洛杉矶会见美国国务卿鲁比奥：商讨牛肉专门配额、直航航线、安全与核能合作（2026-06-15）","date": "2026-06-15","source_url": "https://www.ip.gov.py/ip/2026/06/15/pena-discusses-investment-agenda-and-hemispheric-security-with-u-s-secretary-of-state/","source_name": "Agencia IP (Government)","summary": "世界杯巴拉圭vs美国比赛期间，培尼亚总统在洛杉矶会晤美国国务卿Marco Rubio。讨论三大核心议题：① 争取巴拉圭牛肉对美出口专门配额——目前巴拉圭与巴西共享5万吨MFN配额（2025年10月美国曾短暂成为巴拉圭牛肉第一大出口目的地）；② 建立巴拉圭-美国直飞航线；③ 半球安全合作和核能合作。美方代表团还包括运输部长Sean Duffy和国土安全部长Markwayne Mullin。","image_url": null,"is_gov_source": true,"is_authoritative": true},{"title": "台湾副外长陈明祺6天访巴（6月14-19日）：巩固战略伙伴关系，启动2027年建交70周年筹备（2026-06-17）","date": "2026-06-17","source_url": "https://www.ip.gov.py/ip/2026/06/17/paraguay-and-taiwan-strengthen-cooperation-and-strategic-partnership/","source_name": "Agencia IP (Government)","summary": "台湾副外长陈明祺6月14-19日访巴。6月17日与外长Ramírez Lezcano和副外长Víctor Verdún会晤：① 审查网安、AI、Asunción总医院、台湾-巴拉圭理工大学（UPTP）、健康信息系统（HIS）等合作项目；② 筹备2027年两国建交70周年纪念活动；③ 确认巴拉圭将担任联合国大会副主席（2026-2027届）。巴拉圭仍是南美洲唯一与台湾保持外交关系的国家（全球仅余12国）。","image_url": null,"is_gov_source": true,"is_authoritative": true},{"title": "台湾副外长陈明祺会见美国驻巴代办Robert Alter：正式启动台美巴三边AI、5G、智能交通与网安合作框架（2026-06-19）","date": "2026-06-19","source_url": "https://ocacnews.net/article/428134","source_name": "OCAC News (Taiwan)","summary": "陈明祺6月19日会见美国驻巴拉圭临时代办Robert Alter，讨论台美巴三边合作框架：人工智能、5G、智能交通和网络安全。这是继6月15日培尼亚-鲁比奥会晤后，台美巴安全与技术三边合作的具体化推进。三方合作将巴拉圭锁定在美国-台湾地缘技术供应链中，进一步压缩中国大陆企业在巴的电信、AI和数据中心设备市场空间。","image_url": null,"is_gov_source": false,"is_authoritative": true},{"title": "培尼亚总统会见全体外交使团，西班牙大使赞扬巴拉圭稳定性并宣布Grupo Costa 3亿美元投资（2026-06-18）","date": "2026-06-18","source_url": "https://www.lanacion.com.py/politica/2026/06/18/santiago-pena-y-diplomaticos-trazan-planes-de-cooperacion-internacional-para-paraguay/","source_name": "La Nación","summary": "培尼亚总统在教廷大使馆会见全体外交使团，讨论公共卫生、公民安全、教育、经济发展等国际合作领域。同日西班牙大使Javier Parrondo会见经济部长Lovera，赞扬巴拉圭宏观经济稳定性，宣布Grupo Costa 3亿美元猪肉工厂投资，并表态西班牙支持巴拉圭加入OECD。","image_url": null,"is_gov_source": false,"is_authoritative": true},{"title": "巴拉圭-菲律宾首次元首国事访问：签署相互免签协定和商会MOU（2026-06-18）","date": "2026-06-18","source_url": "https://bilyonaryo.com/2026/06/18/paraguays-santiago-pena-explores-intramuros-in-first-ever-state-visit-to-philippines/social-fancy/","source_name": "Bilyonaryo Business News","summary": "培尼亚总统对菲律宾进行巴拉圭史上首次国事访问（两国1962年建交）。签署：① 普通护照持有人相互免签协定；② 外交培训MOU；③ 菲律宾工商会（PCCI）与REDIEX间商会MOU。两国讨论旅游、贸易、文化交流等合作。巴拉圭本周同期推进台湾、日本、菲律宾三条亚洲外交线——亚洲多元化战略加速实施。","image_url": null,"is_gov_source": false,"is_authoritative": true},{"title": "南共市峰会定于6月29-30日在亚松森CONMEBOL总部举行；乌拉圭接任临时主席国，阿根廷总统米莱不出席（2026-06）","date": "2026-06-20","source_url": "https://www.mercosur.int/avanza-el-proceso-de-ratificacion-del-acuerdo-de-libre-comercio-entre-el-mercosur-y-la-efta/","source_name": "Mercosur","summary": "第67届南共市总统峰会确认于6月29-30日在卢克CONMEBOL总部举行，纪念《亚松森条约》签署35周年。重点议程：南共市-欧盟临时贸易协定执行进展（5月1日生效）、南共市-EFTA协定推进、阿联酋FTA谈判。阿根廷总统米莱确认不出席；乌拉圭接任临时主席国。ARP肉类委员会主席Mario Balmelli（6月18日）指出巴拉圭牛肉出口可翻番但受制于制度性挑战。","image_url": null,"is_gov_source": true,"is_authoritative": true}],"impact_analysis": "","user_notes": ""},{"title": "五、行业专题：通讯、运营商、数字能源与AI","description": "5G频谱与商用进展、光纤基础设施、数字能源投资、AI数据中心建设、行业政策","tier": 1,"events": [{"title": "ANDE推进首座大型太阳能电站招标（Loma Plata, Boquerón, 140MW），获世界银行技术支持（2026-06-18）","date": "2026-06-18","source_url": "https://www.lanacion.com.py/negocios/2026/06/18/ande-avanza-en-la-licitacion-para-la-adquisicion-de-energia-de-primera-planta-solar/","source_name": "La Nación","summary": "ANDE总裁Félix Sosa主持与世界银行的会议，完善Loma Plata（Boquerón省）140MW太阳能光伏电站招标文件。这是新《可再生能源法》（第6034号法令，5月19日实施）的首个重大执行案例。背景：电力需求三年增长约50%，ANDE总裁此前警告须在100%水电耗尽前引入新发电来源。对中国光伏和储能设备出口企业是直接市场机会。","image_url": null,"is_gov_source": false,"is_authoritative": true},{"title": "台湾副外长陈明祺视察台巴AI数据中心选址和Itaipú水电站，评估能源供给能力（2026-06-19）","date": "2026-06-19","source_url": "https://www.lanacion.com.py/politica/2026/06/19/vicecanciller-taiwanes-visito-la-futura-sede-del-data-center-binacional-de-ia-en-paraguay/","source_name": "La Nación","summary": "台湾副外长陈明祺于6月19日视察台巴合资AI数据中心选址地，并与MITIC部长Gustavo Villate商讨项目实施。同日视察Itaipú水电站（14,000MW，全球第二大）评估清洁能源供给能力，以及台湾驻东方市总领事馆。该项目首阶段投资200-300M美元，台巴各50%合资，首期10MW容量，采用台湾Nvidia GPU设备，计划2027年底前投入运营。已接洽Google、Microsoft和Amazon。","image_url": null,"is_gov_source": false,"is_authoritative": true},{"title": "首批Starlink终端运抵并即日部署：100所学校在Chaco接入卫星互联网，最终覆盖1,600所学校+医疗中心（2026-06-18/19）","date": "2026-06-19","source_url": "https://www.ip.gov.py/ip/2026/06/18/paraguay-inicia-despliegue-de-equipos-starlink-para-dar-conectividad-a-1-600-escuelas-de-comunidades-alejadas/","source_name": "Agencia IP (Government)","summary": "MITIC与Copaco联合推进的Starlink项目首批终端于6月18日运抵亚松森（总统培尼亚在社交媒体发布开箱照片），6月19日启动在Chaco地区100所学校的部署，覆盖500个战略站点。在押人员制造天线金属支架作为劳动改造项目。结合+Móvil与Starlink的移动卫星网络合作（南美首例），卫星通信正成为弥补Copaco光纤骨干网建设严重延误的关键替代方案。","image_url": null,"is_gov_source": true,"is_authoritative": true},{"title": "BNamericas专访Atis Group CEO：巴拉圭5G部署处于早期阶段，Claro和Nubicom已获牌照；Atis计划年增10%铁塔（2026-06-16）","date": "2026-06-16","source_url": "https://www.bnamericas.com/en/interviews/atis-group-we-expect-to-increase-our-site-count-by-at-least-10-a-year","source_name": "BNamericas","summary": "Atis Group创始人兼CEO Juan Pablo Blanco接受BNamericas专访（6月16日发布）：① 巴拉圭是Atis三个市场（阿根廷、乌拉圭、巴拉圭）中5G部署起步最晚的，刚进入早期阶段，Claro和Nubicom已获牌照开始部署；② Atis在三国拥有1,000+铁塔，计划年增至少10%；③ 主要客户为Millicom（Tigo）、Telecom Argentina（Personal）、Claro和Antel，占收入99.9%；④ 开发了适配城市环境的新型隐蔽式铁塔设计并从阿根廷出口至巴拉圭。BID Invest正在考虑对Atis投资最多1,000万美元用于铁塔扩张。","image_url": null,"is_gov_source": false,"is_authoritative": true},{"title": "CONATEL宣布数字电视招标流标：零投标参与，短期内不再重开——高成本和社交媒体竞争导致投资者望而却步（2026-06-19）","date": "2026-06-19","source_url": "https://dplnews.com/paraguay-conatel-declara-desierta-licitacion-tv/","source_name": "DPL News","summary": "CONATEL宣布数字地面电视（TDT）牌照公开招标（GR Nº 03/2025）流标——零投标参与。无线电通信经理Martín Gómez指出仅初始设备投资就超200万美元（不含铁塔用地成本），加上社交媒体竞争使投资回报前景黯淡。4家企业此前购买了标书（每份G. 1,000,000不退费）但无一提交正式投标。CONATEL表示至少5年内不会再举行TDT招标。这是继5G拍卖仅2家参与后，CONATEL的又一招标挫折。","image_url": "https://dplnews.com/wp-content/uploads/2026/06/Gemini_Generated_Image_2s4av12s4av12s4a-1024x572.png","is_gov_source": false,"is_authoritative": true},{"title": "El Niño预警对水电产能和能源安全的潜在影响：MAG 6月18日警告强El Niño将持续至2027年4月（2026-06-20）","date": "2026-06-20","source_url": "https://www.latribuna.com.py/negocios/economia/2026/06/20/el-nino-azotara-al-campo-paraguayo-y-causara-estragos-hasta-abril-de-2027/","source_name": "La Tribuna","summary": "La Tribuna 6月20日长篇分析：MAG于6月18日发布的中强El Niño预警不仅威胁农业，也会影响水电产能。过量降雨短期可能增加流量，但长期水库管理复杂化将影响Itaipú和Yacyretá的电网稳定性。对于99%电力来自水电并依赖廉价清洁能源吸引AI数据中心的巴拉圭，El Niño给电力供应稳定性带来额外不确定性。ANDE是否将El Niño因素纳入Loma Plata太阳能加速招标的决策背景值得关注。","image_url": null,"is_gov_source": false,"is_authoritative": true}],"impact_analysis": "","user_notes": ""},{"title": "六、主要客户动向","description": "跟踪巴拉圭主要客户的最新战略布局、投资计划、网络建设和技术选型","tier": 1,"events": [{"title": "Copaco/MITIC启动Starlink全国部署：首批100所学校在Chaco接入，1,600所偏远学校将受益（2026-06-18/19）","date": "2026-06-19","source_url": "https://www.ip.gov.py/ip/2026/06/18/paraguay-inicia-despliegue-de-equipos-starlink-para-dar-conectividad-a-1-600-escuelas-de-comunidades-alejadas/","source_name": "Agencia IP (Government)","summary": "国有电信公司Copaco与MITIC合作，6月18日收到首批Starlink终端，6月19日启动Chaco地区100所学校部署。总统培尼亚在社交媒体发布开箱照片。在押人员制造天线金属支架。Copaco借此弥补其国家DWDM光纤骨干网建设严重延误的短板——此前Paraguay Ciberseguro主任批评该骨干网为不可用的制度神话，边境地区实际依赖巴西光纤。Starlink卫星方案在短期内成为Copaco实现偏远地区覆盖的唯一可行路径。","image_url": null,"is_gov_source": true,"is_authoritative": true},{"title": "Atis Group确认巴拉圭5G部署已启动：与Tigo、Claro、Personal三家运营商均签有铁塔合同（2026-06-16）","date": "2026-06-16","source_url": "https://www.bnamericas.com/en/interviews/atis-group-we-expect-to-increase-our-site-count-by-at-least-10-a-year","source_name": "BNamericas","summary": "Atis Group CEO Juan Pablo Blanco在6月16日BNamericas专访中确认：① 巴拉圭已进入5G部署早期阶段，Claro和Nubicom持有牌照并开始建设；② Atis在巴拉圭与Tigo（Millicom）、Claro（América Móvil）和Personal（Telecom Argentina）均有铁塔共享合同，三大运营商合计贡献其99.9%收入；③ 计划年增至少10%铁塔数量；④ 已将阿根廷开发的城市隐蔽式铁塔设计出口至巴拉圭。BID Invest正考虑对Atis投资最多1,000万美元。铁塔基础设施的扩张速度是评估5G商用时间表的关键先行指标。","image_url": null,"is_gov_source": false,"is_authoritative": true},{"title": "Tigo Paraguay（320万用户/47.3%份额）：5G受限但铁塔共享和移动金融持续布局；Twilio/Sinch短信中断事件引发关注（2026-06）","date": "2026-06-20","source_url": "https://isdown.app/status/twilio/incidents/605525-sms-delivery-delays-from-twilio-phone-numbers-to-tigo-paraguay","source_name": "isdown.app / Twilio Status","summary": "Tigo以320万用户维持47.3%移动市场份额，但因其网络使用华为设备被排除在5G拍卖之外。6月11-12日连续发生两起短信中断：Twilio报告向Tigo Paraguay发送短信延迟约14小时（6月11日），Sinch报告约17小时中断（6月12日），影响企业短信、金融验证和客户通知。Tigo正加大Tigo Money移动钱包和保险业务以寻求5G受限环境下的增长。母公司Millicom股价一年上涨126%，市值约145亿美元。世界杯转播权（Tigo Sports 100/101/102频道独家直播巴拉圭全部比赛）是核心差异化优势。","image_url": null,"is_gov_source": false,"is_authoritative": true},{"title": "Claro巴拉圭（80万用户）：5G商用率先启动（Nokia设备，3500万美元），世界杯免费直播104场比赛（2026-06）","date": "2026-06-20","source_url": "https://www.samenacouncil.org/samena_daily_news?news=108810","source_name": "SAMENA Daily News","summary": "Claro（América Móvil）率先在巴拉圭激活5G商用网络，覆盖Gran Asunción、Ciudad del Este、Encarnación等主要城市，采用Nokia Massive MIMO设备，初始投资3,500万美元。公司获3.5-3.7GHz频段200MHz频谱（拍得价202.1万美元）。ClaroTV同步向光纤和卫星客户免费直播全部104场世界杯比赛。母公司América Móvil在拉美15国拥有2.5亿无线用户。（注：5G商用发布于2026年3-4月，本周World Cup转播为Claro持续增强市场能见度的事件。）","image_url": null,"is_gov_source": false,"is_authoritative": true},{"title": "Personal（原Núcleo，240万用户/35%份额）：华为设备致5G出局，专注低价策略；母公司Telecom Argentina专注本土（2026-06）","date": "2026-06-20","source_url": "https://dplnews.com/paraguay-nueva-subasta-5g-mantiene-restriccion-huawei/","source_name": "DPL News","summary": "Personal（Telecom Argentina子公司，原Núcleo）拥有240万用户（35.5%市场份额），为巴拉圭第二大移动运营商。网络使用华为设备，与Tigo同样被排除于5G拍卖之外。Personal以低价策略竞争（5GB+社交媒体套餐仅25,000瓜拉尼/约3美元），但在5G和农村光纤覆盖方面严重落后。Telecom Argentina正集中资源于阿根廷本土市场，巴拉圭子公司战略投入有限。全市场83%的移动用户目前无法接入5G——这是巴拉圭电信监管面临的最大结构性挑战。","image_url": null,"is_gov_source": false,"is_authoritative": true},{"title": "Nubicom：获200MHz 5G频谱（3.3-3.5GHz），宣布2亿美元全国部署计划但须从零建网（2026-06）","date": "2026-06-20","source_url": "https://www.datacenterdynamics.com/en/news/?tag=nubicom","source_name": "Data Center Dynamics","summary": "Nubicom（阿根廷Salta省固网运营商）在2025年8月CONATEL拍卖中以200万美元获得200MHz 5G频谱（3.3-3.5GHz），宣布2亿美元全国部署计划——巴拉圭最大规模5G部署承诺。但面临巨大执行挑战：须在6周内在巴拉圭设立本地子公司，且从零建设移动网络（目前全无移动基础设施）。CONATEL要求每100MHz频谱安装至少100个基站（10%须服务政府机关）。Nubicom品牌认知度为零，缺乏移动网络运营经验。Atis Group（6月16日BNamericas专访）确认Claro和Nubicom为巴拉圭5G部署的两个先行者。","image_url": null,"is_gov_source": false,"is_authoritative": true}],"impact_analysis": "","user_notes": ""},{"title": "七、对企业经营的综合影响分析","description": "综合宏观环境、行业态势及客户动向，从成本、市场、合规维度分析企业影响","tier": 2,"events": [],"impact_analysis": "【成本维度】\n\n🟡 汇率稳定利好进口：本周瓜拉尼兑美元稳定在G. 6,100水平，BCP预计6-7月波动区间G. 6,100-6,200。瓜拉尼是拉美波动率最低的货币（标准差0.38%），外汇远期市场同比增长44%至12.06亿美元，进口设备/原材料成本可控。\n\n🟡 工资成本温和上升：最低工资上调5%至G. 3,044,000（两倍于CPI 2.4%），7月1日生效。上调幅度适中，不致对企业用工成本造成显著冲击。巴拉圭劳动力成本仍为南美洲最低之一。\n\n🟢 融资成本改善：MEF 6月24日国债拍卖受益于投资级评级（Fitch/Moody's/S&P），主权EMBI利差处于110-120bp历史低位。但民营部门融资成本仍显著高于主权信用指标。\n\n🔴 El Niño = 能源与农业双重风险：MAG 6月18日发布中强El Niño预警（持续至2027年4月）。对依赖水电（99%）的能源密集型项目（数据中心、AI）而言，长期水库管理和电力稳定性存在不确定性。农产品价格上行风险也将传导至食品加工和物流成本。La Tribuna 6月20日长篇分析特别强调了水电产能的潜在影响。\n\n【市场维度】\n\n🟢 出口增长强劲 + 出口多元化取得里程碑突破：1-5月出口79.1亿美元（+16.4%），大豆+48%、猪肉+62.6%。本周两大出口里程碑：巴拉圭首次出口羊肉至阿联酋（6月18日，12吨，Frigorífico Victoria）；西班牙Grupo Costa宣布3亿美元猪肉工厂（6月18日）。\n\n🟢 外交加速多元化：本周外交成果密集——培尼亚会见美国国务卿鲁比奥（6月15日）、台湾副外长陈明祺6天访巴（6月14-19日）、巴拉圭首次对菲律宾国事访问（6月18日）、台美巴三边AI/5G/网安合作启动（6月19日）。南共市峰会（6月29-30日）即将举行——EU协定（5月1日生效）和UAE FTA将进一步释放市场机会。\n\n🟡 5G部署缓慢但铁塔基础设施扩张先行：Atis Group CEO确认巴拉圭5G处于早期阶段，Claro和Nubicom已启动部署。但Tigo（47.3%）和Personal（35%）被排除——全市场83%用户无法接入5G。Atis计划年增10%铁塔，BID Invest正考虑1,000万美元投资。铁塔扩张速度是判断5G商用时间表的关键先行指标。\n\n🟡 CONATEL连续招标挫折：继5G拍卖仅2家参与后，TDT数字电视招标零投标流标（6月19日），CONATEL表示至少5年内不重开。监管机构在数字化转型中的执行力存疑。\n\n🟢 数据中心/AI长期增长逻辑强化，但短期内增不确定性：台湾副外长6月19日视察台巴AI数据中心选址并评估Itaipú能源能力，首期200-300M美元。但电价法令废除（6月10日）+ El Niño水电风险（6月18日）为大规模投资注入双重不确定性。\n\n🟢 卫星互联网填补光纤空白：Starlink终端首批到货（6月18日）、100所学校即日部署（6月19日）。Copaco借此弥补其光纤骨干网建设严重延误的短板。对需要可靠连接的企业，卫星+光纤双模方案值得评估。\n\n🟢 电子制造业新机遇：第7546/25号高科技产品法在尚未完全实施前已吸引首个笔记本组装项目评估（6月17日）。20%本地整合即可获得南共市原产地证书和零关税准入——巴拉圭有望成为南共市电子制造新节点。\n\n【合规维度】\n\n🟡 最低工资以行政令方式解决——政策执行可预测性增强：Conasam三方僵局以总统行政令干预结束，避免了总罢工风险。政府在CPI 2.4%的背景下选择5%温和调升，展现出务实平衡姿态。但企业界批评未遵守《劳动法》三方协商程序。\n\n🔴 台美巴三边技术合作正式启动——中国电信企业准入继续被系统化封锁：台湾副外长陈明祺6月19日与美国临时代办建立三方AI+5G+网安合作框架。5G华为限制条款将继续严格执行，Tigo/Personal被迫停留在4G。中国通信设备在巴拉圭市场面临的结构性壁垒进一步固化。\n\n🔴 Santa Rita特大武装抢劫案暴露公共安全短板——PCC跨国犯罪渗透：全周持续发酵（6月16-20日），6人被捕含PCC爆炸专家，现役警察涉案。内政部部署4,500兵力军事化东部边境。对Alto Paraná地区投资环境信心构成负面影响。\n\n🟢 数据保护与AI法规持续推进：待出台数据中心法将为投资提供法律确定性。高科技产品法实施细则即将完成。对合规运营的企业而言是利好。","user_notes": ""},{"title": "八、对中资企业的专项影响与建议","description": "针对中资企业的特殊风险与机遇分析，包括政策风险、外交风险、营商建议","tier": 2,"events": [],"impact_analysis": "【风险分析】\n\n🔴 高风险：5G/电信设备市场准入被进一步系统化锁定\n本周台湾副外长陈明祺与美方临时代办正式建立了台美巴三边AI+5G+网安合作框架（6月19日）。CONATEL 5G拍卖的华为/中兴限制条款在可预见的未来不会松动。Tigo和Personal（合计82.5%用户）被排除在5G之外这一窘境虽商业上不可持续，但政策调整需重大地缘政治转变。CONATEL数字电视招标也宣告流标（6月19日），监管执行力存疑。\n建议：① 跟踪Atis Group等独立铁塔公司的扩张进度——作为运营商中立的基础设施方，铁塔共享模式可能为设备间接供应开辟通道；② 探索非5G领域：数据中心基础设施（服务于台巴AI中心、HIVE Digital等）、光纤传输/DWDM骨干网（Copaco建设严重延误=市场缺口）、企业专网、可再生能源微电网通信；③ 探索通过南共市国家（巴西、阿根廷）子公司或合资架构合规进入的路径。\n\n🔴 高风险：外交张力持续且加深\n本周同时出现培尼亚-鲁比奥会晤（6月15日）、台湾副外长6天访巴（6月14-19日）、台美巴三边AI/5G协议（6月19日）——巴拉圭被更深地锁定在美国-台湾战略轨道中。但日本企业（东京研讨会6月11日，日巴投资协定6月23日众议院表决）和菲律宾（首次元首访问6月18日）的积极推进也表明巴拉圭正在多元化亚洲伙伴关系。\n建议：将商业活动与政治关系完全分离；避免触碰政府敏感项目。关注第三方渠道（南共市框架、意大利/西班牙贸易通道）可能形成的间接经济联系。\n\n🟡 中风险：El Niño可能影响工程和能源项目交付\nMAG 6月18日预警 + La Tribuna 6月20日深入分析均指出水电产能和基础设施施工面临气候风险。若中资企业计划在巴拉圭部署数据中心或大型工业项目，须将El Niño风险纳入工期和成本模型。\n\n【机遇分析】\n\n🟢 重大机遇：可再生能源设备市场 —— ANDE 140MW太阳能招标是明确信号\nANDE于6月18日与世界银行推进Loma Plata 140MW太阳能招标文件完善。新《可再生能源法》（第6034号）为非水可再生能源提供首个法律框架。电力需求三年增长约50%，ANDE总裁明确呼吁投资替代能源。中国在光伏板、风机和储能领域拥有全球成本领先优势——巴拉圭非水可再生能源领域从零起步。\n建议：① 立即对接ANDE太阳能/生物质能招标项目；② 提供分布式光伏+储能工业园区解决方案（满足数据中心和大型工业用户需求）；③ 参与巴拉圭首轮可再生能源拍卖——该领域目前没有中国企业的地缘政治壁垒。\n\n🟢 重大机遇：数据中心和光纤基础设施（非5G领域）\n台巴AI数据中心（首期200-300M美元）进入选址阶段并完成Itaipú能源评估（6月19日）；HIVE Digital BUZZ Cloud上线；X8 Cloud大规模项目推进中；Atis Group计划年增10%铁塔。虽然5G无线接入受限，但数据中心配套设备（服务器、制冷系统、电源管理）、光纤传输网络（Copaco骨干网严重延误=市场缺口）和企业专网面临较少地缘政治限制。\n建议：对接台巴AI中心（MITIC/台湾ICDF）、HIVE Digital、Dominion等现有项目的设备供应需求。\n\n🟢 机遇：Starlink卫星通信生态中的配套设备和服务机会\n首批1,600套Starlink终端6月18-19日到货并启动部署。Copaco光纤骨干网不完善意味着卫星通信需求将长期存在。配套的安装服务、本地网络集成、太阳能供电系统、天线支架等在押人员制造产能有限的环节存在差异化切入空间。\n\n🟢 新机遇：电子制造组装——第7546/25号法律窗口\n该法在完全实施前已吸引首个笔记本组装项目评估（6月17日，InfoNegocios报道）。20%本地整合率即可获南共市原产地证书（零关税准入7亿消费者市场）。巴拉圭电价较巴西低2.8倍+劳动力成本优势+南共市通道。对于寻求绕开直接对巴出口地缘政治敏感性的中国电子制造企业，通过来料加工模式在东方市设立组装线是值得评估的选项。\n\n【行动建议】\n\n【立即（1-2周）】：① 深入研究ANDE Loma Plata 140MW太阳能招标的技术参数和投标条件；② 对接台巴AI数据中心项目方（MITIC/台湾ICDF），探讨数据中心设备和解决方案供应；③ 出席6月29-30日南共市峰会（CONMEBOL，卢克），观察区域政策和贸易走向。\n\n【短期（1-3个月）】：④ 建立与ANDE可再生能源部门的直接联系，寻求太阳能+储能试点项目；⑤ 评估在东方市利用第7546/25号法律设立电子组装设施的可行性（笔记本、光伏组件、电气设备），借道南共市+EU零关税协定覆盖7亿消费者；⑥ 联系Atis Group了解铁塔基础设施的设备采购需求。\n\n【中期（3-12个月）】：⑦ 锁定1-2个可再生能源领域标杆项目（太阳能电站或分布式储能）；⑧ 基于El Niño气候走向和电力政策变化重新评估更广泛的市场进入策略；⑨ 考虑通过南共市区域联动（巴西/阿根廷子公司）降低地缘政治敏感性。","user_notes": ""}]}};

  if(opts.bars){var fc=opts.forecastFrom;for(var i=0;i<n;i++){var bx=mL+Math.round(i*gap+(gap-barW)/2),bh=Math.round((d.bars[i]-bMin)/bRng*cH),by=mT+cH-bh,bv=(d.bars[i]>=10?Math.round(d.bars[i]):d.bars[i].toFixed(1))+barU,isFc=fc!=null&&i>=fc;s+='<rect x="'+bx+'" y="'+by+'" width="'+barW+'" height="'+(bh||2)+'" fill="'+d.bc+'" rx="2" '+(isFc?'opacity="0.4" stroke="'+d.bc+'" stroke-width="1.5" stroke-dasharray="4,3"':'opacity="0.85"')+'><title>'+bv+(isFc?' '+L('(预测)','(Forecast)'):'')+'</title></rect>';s+='<text x="'+(bx+Math.floor(barW/2))+'" y="'+(by-3)+'" text-anchor="middle" font-size="7" fill="'+(isFc?'#94A3B8':'#334155')+'" font-weight="600">'+(d.bars[i]>=10?Math.round(d.bars[i]):d.bars[i].toFixed(1))+'</text>';}}

function expandMacroCard(type){
  var fnMap={GDP:renderMacroCardGDP,CPI:renderMacroCardCPI,FX:renderMacroCardFX,RIN:renderMacroCardRIN};
  var fn=fnMap[type];if(!fn)return;

    if(type==='FX')dataSection=renderFXDailyTable(MACRO_FX,MACRO_FX.lu);
    else{var dMap={CPI:MACRO_CPI,RIN:MACRO_RIN};var unitMap={CPI:MACRO_CPI.lu,RIN:L(MACRO_RIN.lu[0],MACRO_RIN.lu[1])};dataSection=renderMacroDataTable(dMap[type],unitMap[type]);}
  }

function renderMacroDataTable(d,unit){

  h+='<div class="macro-data-table-wrap" style="display:none"><table class="macro-data-table"><thead><tr><th>'+L('月份','Month')+'</th><th>2023</th><th>2024</th><th>2025</th><th>2026*</th></tr></thead><tbody>';

    h+='</tr>';
  }

function renderFXDailyTable(d,unit){
  var DM=[31,28,31,30,31,30,31,31,30,31,30,31],dl=d.line||[];
  var h='<div class="macro-data-section"><button class="macro-data-toggle" onclick="toggleDataTable(this)">'+L('查看每日源数据 ▼','View Daily Data ▼')+'</button>';
  h+='<div class="macro-data-table-wrap" style="display:none"><table class="macro-data-table"><thead><tr><th>'+L('日期','Date')+'</th><th>PYG/USD</th></tr></thead><tbody>';
  var dates=[],day=1,mo=0,yr=2023;
  for(var i=0;i<dl.length;i++){
    dates.push(yr+'-'+(mo<9?'0'+(mo+1):(mo+1))+'-'+(day<10?'0'+day:day));
    day++;var dim=DM[mo];if(mo===1&&yr%4===0)dim=29;

function toggleDataTable(btn){

  else{wrap.style.display='none';btn.innerHTML=btn.innerHTML.replace('隐藏','查看').replace('Hide','View').replace(' ▲',' ▼');}
}
function closeMacroModal(e){

}

function renderAll(){
  if(!briefingData)return;
  var d=briefingData;
  document.getElementById('headerSubtitle').textContent=(d.topic||'')+' · '+(d.time_span||'');

  var sections=d.sections||[],tier1=[],tier2=[];
  for(var i=0;i<sections.length;i++){
    if(sections[i].tier===2)tier2.push(sections[i]);else tier1.push(sections[i]);

  for(var i=0;i<tier1.length;i++)total+=(tier1[i].events||[]).length;

  var pills='<div class="stats-row-total"><div class="stat-pill pill-total" onclick="scrollToSec(null)"><span class="pill-label">'+L('全部事件','All Events')+'</span><span class="pill-count">'+total+'</span></div></div>';
  for(var row=0;row<2;row++){
    pills+='<div class="stats-row-sections">';

      pills+='<div class="stat-pill" style="background:'+c.bg+';color:'+c.text+';" onclick="scrollToSec('+idx+')"><span class="pill-dot" style="background:'+c.dot+'"></span><span class="pill-label">'+stripNum(sec.title)+'</span><span class="pill-count">'+cnt+'</span></div>';

function renderSection(sec,idx){
  var events=sec.events||[],isT2=sec.tier===2;
  var g=GRAD[idx%8],icon=ICONS[idx%8];
  var body='';
  if(isT2||events.length===0){
    if(sec.impact_analysis)body='<div class="analysis-body">'+fmt(sec.impact_analysis)+'</div>';
    else if(!isT2)body='<div style="padding:4px 22px 16px;color:#94A3B8;font-size:13px;">'+L('暂无此时间段内的事件','No events in this period')+'</div>';
  }else{
    var cards='';
    for(var i=0;i<events.length;i++)cards+=renderCard(events[i],g[0],g[1],icon);
    body='<div class="events-grid">'+cards+'</div>';
  }
  var badge=events.length>0?'<span class="badge">'+events.length+L(' 条事件',' events')+'</span>':'';
  return '<div class="section s'+(idx%8)+(isT2?' tier2':'')+'" id="sec-'+idx+'"><div class="section-header"><h2>'+esc(sec.title||'')+'</h2>'+badge+'</div>'+(sec.description?'<div class="section-desc">'+esc(sec.description)+'</div>':'')+body+'</div>';

function renderCard(evt,phFrom,phTo,icon){
  var img=evt.image_url,hasImg=img&&img.indexOf('http')===0;
  var ih='';
  if(hasImg)ih='<img src="'+esc(img)+'" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">';
  ih+='<div class="img-placeholder" style="background:linear-gradient(135deg,'+phFrom+','+phTo+');'+(hasImg?'display:none':'display:flex')+';font-size:32px;color:#fff;">'+icon+'</div>';

  var tags='';
  if(evt.date)tags+='<span class="event-tag date">'+esc(evt.date)+'</span>';
  if(evt.is_gov_source)tags+='<span class="event-tag gov">'+L('政府官网','Government')+'</span>';
  else if(evt.is_authoritative)tags+='<span class="event-tag auth">'+L('权威媒体','Authoritative')+'</span>';
  if(evt.source_name)tags+='<span class="event-tag source">'+esc(evt.source_name)+'</span>';

  var link=evt.source_url?'<a class="event-link" href="'+esc(evt.source_url)+'" target="_blank" rel="noopener">'+L('查看原文 →','Read more →')+'</a>':'';
  return '<div class="event-card"><div class="event-img">'+ih+'</div><div class="event-body"><div class="event-meta">'+tags+'</div><div class="event-title">'+esc(evt.title||'')+'</div>'+(evt.summary?'<div class="event-summary">'+esc(ss(evt.summary))+'</div>':'')+link+'</div></div>';
}

function fmt(text){
  var h=esc(text);
  h=h.replace(/^## (.+)$/gm,'<h3>$1</h3>');
  h=h.replace(/^- (.+)$/gm,'<li>$1</li>');
  h=h.replace(/((?:<li>.*<\/li>\n?)+)/g,'<ul>$1</ul>');
  h=h.replace(/\n/g,'<br>');
  return h;
}

function scrollToSec(idx){
  var pills=document.querySelectorAll('.stat-pill');
  for(var i=0;i<pills.length;i++)pills[i].style.outline='';
  if(idx===null||idx===undefined){window.scrollTo({top:0,behavior:'smooth'});return;}
  var el=document.getElementById('sec-'+idx);
  if(!el)return;
  el.scrollIntoView({behavior:'smooth',block:'start'});
  el.style.boxShadow='0 0 0 3px #3B82F6';
  setTimeout(function(){el.style.boxShadow='';},1500);
}

  var h='<div class="update-modal-overlay" id="updateModal" onclick="closeUpdateModal(\'updateModal\')"><div class="update-modal" onclick="event.stopPropagation()"><h3>'+L('更新简报','Update Briefing')+'</h3>';
  h+='<label>'+L('时间跨度','Time Span')+'</label><div class="time-presets" id="timePresets">';
  var presets=[['1w',L('近1周','1 Week')],['2w',L('近2周','2 Weeks')],['1m',L('近1月','1 Month')],['3m',L('近3月','3 Months')],['6m',L('近6月','6 Months')]];
  for(var p=0;p<presets.length;p++)h+='<span class="time-preset" data-val="'+presets[p][0]+'" onclick="selectPreset(this)">'+presets[p][1]+'</span>';
  h+='</div><input type="text" id="customTimeSpan" placeholder="'+L('或输入自定义时间，如: June 1 – June 20, 2026','Or enter custom span, e.g. June 1 – June 20, 2026')+'" style="font-size:12px">';
  h+='<div style="border-top:1px solid #E2E8F0;margin:14px 0 10px;padding-top:10px"><label style="font-size:11px;color:#64748B;margin-bottom:6px">'+L('更新宏观数据（下载最新BCP Excel后填入文件名）','Update Macro Data (fill in latest BCP Excel filenames)')+'</label>';
  h+='<div style="display:flex;gap:6px;margin-bottom:6px"><input type="text" id="cpiFileName" placeholder="'+L('CPI文件，如 AE_IPC-26.6.xlsx','CPI file, e.g. AE_IPC-26.6.xlsx')+'" style="flex:1;font-size:11px;padding:6px 8px;border:1px solid #CBD5E1;border-radius:6px"><input type="text" id="rinFileName" placeholder="'+L('RIN文件，如 reservas...xlsx','RIN file, e.g. reservas...xlsx')+'" style="flex:1;font-size:11px;padding:6px 8px;border:1px solid #CBD5E1;border-radius:6px"></div>';
  h+='<button class="btn-secondary btn-sm" onclick="refreshMacroData()" style="width:100%">'+L('刷新宏观数据','Refresh Macro Data')+'</button></div>';
  h+='<div class="btn-row" style="margin-top:10px"><button class="btn-secondary" onclick="closeUpdateModal(\'updateModal\')">'+L('取消','Cancel')+'</button><button class="btn-primary" id="genBtn" onclick="startGenerate()">'+L('开始生成','Generate')+'</button></div>';
  h+='<div id="genStatus" style="margin-top:10px;font-size:12px;color:#64748B;display:none"></div></div></div>';
  document.body.insertAdjacentHTML('beforeend',h);
  window._selectedPreset='1w';
}
function selectPreset(el){
  var p=document.getElementById('timePresets');if(p)for(var i=0;i<p.children.length;i++)p.children[i].classList.remove('active');
  el.classList.add('active');window._selectedPreset=el.getAttribute('data-val');
}
function startGenerate(){
  var ts=document.getElementById('customTimeSpan').value.trim()||window._selectedPreset||'1w';
  var btn=document.getElementById('genBtn'),st=document.getElementById('genStatus');
  btn.disabled=true;btn.textContent=L('生成中…','Generating…');
  st.style.display='block';st.innerHTML='<span class="loading-spinner"></span>'+L('正在搜索最新资讯并编译简报，预计需要30-60秒…','Searching latest news and compiling briefing, ~30-60s…');
  fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic:L('巴拉圭简报','Paraguay Briefing'),time_span:ts})}).then(function(r){if(!r.ok)throw Error();return r.json();}).then(function(data){
    DATA['zh']=data;DATA['en']=data;briefingData=data;renderAll();closeUpdateModal('updateModal');
  }).catch(function(){
    st.innerHTML='<span style="color:#EF4444">'+L('生成失败，请确保 Flask 服务器已启动 (python3 web_app.py)','Failed. Make sure Flask server is running: python3 web_app.py')+'</span>';
    btn.disabled=false;btn.textContent=L('开始生成','Generate');
  });
}
function refreshMacroData(){
  var cpiFile=document.getElementById('cpiFileName').value.trim();
  var rinFile=document.getElementById('rinFileName').value.trim();
  if(!cpiFile&&!rinFile){alert(L('请至少输入一个文件名','Please enter at least one filename.'));return;}
  var st=document.getElementById('genStatus');
  st.style.display='block';st.innerHTML='<span class="loading-spinner"></span>'+L('正在读取宏观数据文件…','Reading macro data files…');
  fetch('/api/update-macro',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cpi_file:cpiFile,rin_file:rinFile})}).then(function(r){if(!r.ok)throw Error();return r.json();}).then(function(data){
    var msgs=[];
    if(data.cpi&&data.cpi.length){MACRO_CPI.line=data.cpi;msgs.push(L('CPI已更新('+data.cpi.length+'个月)','CPI updated ('+data.cpi.length+' mo)'));}
    if(data.cpi_error)msgs.push(L('CPI错误: ','CPI error: ')+data.cpi_error);
    if(data.rin&&data.rin.length){MACRO_RIN.line=data.rin;msgs.push(L('RIN已更新('+data.rin.length+'个月)','RIN updated ('+data.rin.length+' mo)'));}
    if(data.rin_error)msgs.push(L('RIN错误: ','RIN error: ')+data.rin_error);
    if(msgs.length){renderAll();st.innerHTML='<span style="color:#10B981">'+msgs.join('; ')+'</span>';}
    else st.innerHTML='<span style="color:#EF4444">'+L('更新失败','Update failed')+'</span>';
  }).catch(function(){st.innerHTML='<span style="color:#EF4444">'+L('更新失败，请确保 Flask 服务器已启动','Failed. Make sure Flask server is running.')+'</span>';});
}
function closeUpdateModal(id){
  var m=document.getElementById(id||'updateModal');if(m)m.remove();
  var h=document.getElementById('histModal');if(h&&id!=='histModal')h.remove();
}
document.addEventListener('DOMContentLoaded',function(){
  if(window.IS_STANDALONE)document.getElementById('standaloneBanner').style.display='block';
  if(MACRO_FX.monthly&&!MACRO_FX.line)MACRO_FX.line=expandToDaily(MACRO_FX.monthly,MACRO_FX_MONTHDAYS);
  fetch('/api/briefing').then(function(r){if(!r.ok)throw Error();return r.json();}).then(function(data){
    DATA['zh']=data;DATA['en']=data;briefingData=data;currentLang='en';renderAll();updateLangBtn();
  }).catch(function(){
    briefingData=DATA['en'];currentLang='en';renderAll();updateLangBtn();
  });
});
</script>
</body>
</html>
